  syncToHash();
});

function renderActiveTab() {
  switch (state.activeTab) {
    case 'performance': renderPerformanceTab(); break;
    case 'tradeoff': renderTradeoffTab(); break;
    case 'trends': renderTrendsTab(); break;
    case 'data': renderDataTab(); break;
    case 'accuracy': renderAccuracyTab(); break;
  }
  syncHeaderH();
}

/* ================================================================
   9. PERFORMANCE TAB
   ================================================================ */
let _perfChartRAF = null;
function renderPerformanceTab() {
  if (_perfChartRAF) { cancelAnimationFrame(_perfChartRAF); _perfChartRAF = null; }
  const container = document.getElementById('tab-performance');
  destroyChartsIn(container);
  const fc = filteredConfigs();
  // Sort by backend → model → ISL/OSL → concurrency for grouped readability
  const entries = Object.entries(fc).sort((a, b) => {
    const am = a[1], bm = b[1];
    return am.backend.localeCompare(bm.backend) || am.model.localeCompare(bm.model) || am.islOsl.localeCompare(bm.islOsl) || am.conc - bm.conc;
  });

  if (entries.length === 0) {
    container.innerHTML = '<div class="chart-empty">No data matches the current filters.</div>';
    return;
  }

  // --- Bar Charts: one per model ---
  const pm = PERF_METRICS.find(m => m.key === state.perfMetric) || PERF_METRICS[0];
  const metricBtns = PERF_METRICS.map(m =>
    `<button class="sel-btn ${m.key === state.perfMetric ? 'active' : ''}" data-metric="${m.key}">${m.label}</button>`
  ).join('');

  // Group entries by backend + model so native/OOT stay distinct
  const byModel = {};
  for (const [key, cfg] of entries) {
    const groupKey = `${cfg.backend}|${cfg.model}`;
    if (!byModel[groupKey]) {
      const group = [];
      group._backend = cfg.backend;
      group._model = cfg.model;
      byModel[groupKey] = group;
    }
    byModel[groupKey].push([key, cfg]);
  }

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:var(--gap-md)">
    <h3 style="margin:0;font-size:13px;color:var(--text-tertiary)">${pm.label} — Model Comparison</h3>
    <div class="model-selector" style="margin:0">${metricBtns}</div>
  </div><div class="chart-grid">`;

  let chartIdx = 0;
  for (const [groupKey, modelEntries] of Object.entries(byModel)) {
    const backend = modelEntries._backend;
    const model = modelEntries._model;
    const color = getModelColor(backend, model);
    const concList = [...new Set(modelEntries.map(([, c]) => c.conc))];
    const sortedEntries = modelEntries.sort((a, b) => a[1].islOsl.localeCompare(b[1].islOsl) || a[1].conc - b[1].conc);
    const mLabels = sortedEntries.map(([, c]) => `${fmtIslOsl(c.islOsl)} c=${c.conc}`);
    const mValues = sortedEntries.map(([, c]) => c[pm.key] || 0);
    const mBgColors = sortedEntries.map(([, c]) => getBarColor(backend, model, c.conc, concList));
    const mBdColors = sortedEntries.map(([k]) => regressions[k] ? 'rgba(240,85,69,0.8)' : color.border);
    const mBdWidths = sortedEntries.map(([k]) => regressions[k] ? 2.5 : 1.5);
    const avgVal = mValues.length ? mValues.reduce((a, b) => a + b, 0) / mValues.length : null;

    html += `<div class="chart-card${Object.keys(byModel).length <= 2 ? ' hero' : ''}">
      <h3 style="color:${color.text}">${backend} · ${model}</h3>
      <div class="chart-wrap"><canvas id="perf-bar-${chartIdx}"></canvas></div>
    </div>`;
    // Store data for chart creation after innerHTML
    byModel[groupKey]._chartData = { id: `perf-bar-${chartIdx}`, labels: mLabels, values: mValues, bgColors: mBgColors, bdColors: mBdColors, bdWidths: mBdWidths, avgVal, sortedEntries };
    chartIdx++;
  }
  html += '</div>';

  // --- Table ---
  html += `<div class="table-watermark"><table class="perf-table"><thead><tr>
    <th>Mode</th><th>Model</th><th>ISL/OSL</th><th class="num">Conc</th><th class="num">TP</th><th>GPU</th>
    <th class="num">Total tok/s</th><th class="num">Output tok/s</th>
    <th class="num">Interac.</th>
    <th class="num">TPOT (ms)</th><th class="num">TTFT (ms)</th>
    <th class="num">Trend</th><th>Commit</th><th>Run</th>
  </tr></thead><tbody>`;

  const totalTputMax = Math.max(...entries.map(([, c]) => c['Total Tput'] || 0), 1);
  const outTputMax = Math.max(...entries.map(([, c]) => c.throughput || 0), 1);
  const tpots = entries.map(([, c]) => c.TPOT).filter(v => v != null);
  const tpotMin = Math.min(...tpots, 0), tpotMax = Math.max(...tpots, 1);
  const ttfts = entries.map(([, c]) => c.TTFT).filter(v => v != null);
  const ttftMin = Math.min(...ttfts, 0), ttftMax = Math.max(...ttfts, 1);

  for (const [key, cfg] of entries) {
    const reg = regressions[key];
    const hist = historyMap[key];
    const prev = (hist && hist.length > 1) ? hist[1] : null;
    const commitId = cfg.commit.id ? cfg.commit.id.slice(0, 7) : '';
    const totalTputPct = (cfg['Total Tput'] || 0) / totalTputMax * 100;
    const outTputPct = (cfg.throughput || 0) / outTputMax * 100;
    const tpotRatio = cfg.TPOT != null ? (cfg.TPOT - tpotMin) / (tpotMax - tpotMin || 1) : 0;
    const ttftRatio = cfg.TTFT != null ? (cfg.TTFT - ttftMin) / (ttftMax - ttftMin || 1) : 0;

    const modelTextColor = getModelColor(cfg.backend, cfg.model).text;
    const regClass = reg ? (reg.severity === 'critical' ? 'regression' : 'regression-warning') : '';
    const dataAge = Date.now() - cfg.date;
    const staleClass = dataAge > 3 * 86400000 ? ' stale-data' : '';
    html += `<tr class="${regClass}${staleClass}" data-key="${key}">
      <td style="white-space:nowrap">${escHTML(cfg.backend)}</td>
      <td class="model-name" style="color:${modelTextColor}">${reg ? '⚠ ' : ''}${escHTML(cfg.model)}</td>
      <td>${fmtIslOsl(cfg.islOsl)}</td>
      <td class="num">${cfg.conc}</td>
      <td class="num">${cfg._gpu_count || '—'}</td>
      <td style="white-space:nowrap;font-size:11px">${cfg._gpu_name ? (cfg._gpu_count ? cfg._gpu_count + '× ' : '') + cfg._gpu_name : '—'}</td>
      <td class="num data-bar"><div class="data-bar-fill" style="width:${totalTputPct}%;background:rgba(63,185,80,0.12)"></div><span class="data-bar-text">${cfg['Total Tput'] != null ? fmtNum(cfg['Total Tput'], 1) : '—'}</span></td>
      <td class="num data-bar"><div class="data-bar-fill" style="width:${outTputPct}%;background:rgba(126,143,174,0.10)"></div><span class="data-bar-text">${fmtNum(cfg.throughput, 1)}</span></td>
      <td class="num">${cfg.TPOT != null && cfg.TPOT > 0 ? fmtNum(1000 / cfg.TPOT, 1) : '—'}</td>
      <td class="num" style="background:${heatBg(tpotRatio)}">${cfg.TPOT != null ? fmtNum(cfg.TPOT, 2) : '—'}</td>
      <td class="num" style="background:${heatBg(ttftRatio)}">${cfg.TTFT != null ? fmtNum(cfg.TTFT, 1) : '—'}</td>
      <td class="num" style="white-space:nowrap">${trendHTML(cfg.throughput, prev ? prev.throughput : null, false)} <button class="trend-jump" data-trend-key="${cfg.backend}|${cfg.model}" title="View trends">trend →</button></td>
      <td>${safeHref(cfg.commit.url) ? `<a href="${escHTML(safeHref(cfg.commit.url))}" target="_blank" rel="noopener noreferrer">${commitId}</a>` : commitId}</td>
      <td>${safeHref(cfg.runUrl) ? `<a href="${escHTML(safeHref(cfg.runUrl))}" target="_blank" rel="noopener noreferrer">view</a>` : '—'}</td>
    </tr>`;
    // Detail row
    html += `<tr class="detail-row" data-detail="${key}"><td colspan="14">${buildDetailHTML(key, cfg)}</td></tr>`;
  }
  html += '</tbody></table></div>';

  container.innerHTML = html;

  // Bind table events immediately (fast, no chart rendering)
  _bindPerfTableEvents(container, byModel);
  syncHeaderH();
  bindFixedThead(container);

  // Defer chart creation to next frame so table renders first
  _perfChartRAF = requestAnimationFrame(() => {
    _perfChartRAF = null;
    if (!document.getElementById(Object.values(byModel)[0]?._chartData?.id)) return;
    _createPerfCharts(byModel, pm);
  });
}

function _createPerfCharts(byModel, pm) {
  for (const [model, modelEntries] of Object.entries(byModel)) {
    const cd = modelEntries._chartData;
    if (!cd) continue;
    new Chart(document.getElementById(cd.id), {
      type: 'bar',
      data: { labels: cd.labels, datasets: [{ data: cd.values, backgroundColor: cd.bgColors, borderColor: cd.bdColors, borderWidth: cd.bdWidths, borderRadius: 4 }] },
      plugins: [avgLinePlugin(cd.avgVal, 'avg ' + fmtCompact(cd.avgVal, pm.key === 'TPOT' ? 2 : 0))],
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 24 } },
        plugins: {
          legend: { display: false },
          tooltip: { ...chartTooltipOpts(), callbacks: {
            title: (items) => model + ' · ' + cd.labels[items[0].dataIndex],
            label: (item) => ` ${pm.label}: ${fmtNum(item.raw, pm.key === 'TPOT' ? 2 : 1)} ${pm.unit}`,
            afterBody: () => '\nClick for details'
          }},
          datalabels: { display: cd.values.length <= 16, color: C_LEGEND, anchor: 'end', align: 'top', clip: false, font: { size: 10, family: '"SF Mono", monospace' }, formatter: v => fmtCompact(v, pm.key === 'TPOT' ? 2 : 0) }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: C_TICK, maxRotation: 45, font: { size: 10 } } },
          y: { grid: chartGridOpts(), title: { display: true, text: pm.unit, color: C_TICK }, ticks: { color: C_TICK }, grace: '5%' }
        },
        onClick: (_e, elems) => {
          if (!elems.length) return;
          const [key, cfg] = cd.sortedEntries[elems[0].index];
          if (key) showPopover(key, cfg);
        }
      }
    });
  }
}

function _bindPerfTableEvents(container, byModel) {
  container.querySelectorAll('tr.detail-row').forEach(dr => {
    dr.addEventListener('click', (e) => e.stopPropagation());
  });
  container.querySelectorAll('tr[data-key]').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.closest('a') || e.target.closest('button')) return;
      const detail = container.querySelector(`tr[data-detail="${row.dataset.key}"]`);
      if (detail) { detail.classList.toggle('expanded'); row.classList.toggle('row-open'); }
    });
  });
  container.querySelectorAll('.trend-jump').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      switchToTrends(btn.dataset.trendKey);
    });
  });
  container.querySelectorAll('.sel-btn[data-metric]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.perfMetric = btn.dataset.metric;
      renderPerformanceTab();
    });
  });
}

function switchToTrends(trendModelKey) {
  state.trendModelKey = trendModelKey;
  state.activeTab = 'trends';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'trends'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === 'tab-trends'));
  renderTrendsTab();
  syncToHash();
  document.getElementById('tab-trends').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function switchToTrace(configKey, runDate) {
  state.activeTab = 'data';
  state.dataView = 'table';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'data'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === 'tab-data'));
  renderDataTab();
  syncToHash();
  // Find and expand the matching row, then scroll to it
  requestAnimationFrame(() => {
    const container = document.getElementById('tab-data');
    const rowId = `data-${configKey}-${runDate}`;
    const row = container.querySelector(`tr[data-key="${rowId}"]`);
    if (row) {
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      const detail = container.querySelector(`tr[data-detail="${rowId}"]`);
      if (detail && !detail.classList.contains('expanded')) {
        detail.classList.add('expanded');
        row.classList.add('row-open');
      }
      row.classList.add('flash');
      setTimeout(() => row.classList.remove('flash'), 1500);
    }
  });
}

/* ================================================================
   10. TRADEOFF TAB
   ================================================================ */
function renderTradeoffTab() {
  const container = document.getElementById('tab-tradeoff');
  destroyChartsIn(container);
  const fc = filteredConfigs();
  const entries = Object.entries(fc);
  if (entries.length === 0) { container.innerHTML = '<div class="chart-empty">No data matches the current filters.</div>'; return; }

  // Group by backend+model+ISL/OSL for scatter series
  const seriesMap = {};
  for (const [key, cfg] of entries) {
    const sKey = `${cfg.backend} · ${cfg.model} ${cfg.islOsl}`;
    if (!seriesMap[sKey]) seriesMap[sKey] = { backend: cfg.backend, model: cfg.model, islOsl: cfg.islOsl, points: [], concLabels: [], configKeys: [] };
    const tpot = cfg.TPOT;
    const totalTput = cfg['Total Tput'];
    const gpuCount = cfg._gpu_count || 8;
    if (tpot && tpot > 0 && totalTput) {
      seriesMap[sKey].points.push({ x: 1000 / tpot, y: totalTput / gpuCount });
      seriesMap[sKey].concLabels.push(cfg.conc);
      seriesMap[sKey].configKeys.push(key);
    }
  }

  // Group models into families
  const familyMap = {};
  for (const [, cfg] of entries) {
    const fam = modelFamily(cfg.model);
    if (!familyMap[fam]) familyMap[fam] = new Set();
    familyMap[fam].add(cfg.model);
  }
  const tradeoffFamilies = Object.keys(familyMap).sort();

  let html = '<div class="chart-grid">';
  for (let fi = 0; fi < tradeoffFamilies.length; fi++) {
    const fam = tradeoffFamilies[fi];
    const safeId = fi + '-' + fam.replace(/[^a-zA-Z0-9]/g, '');
    const famLabel = familyMap[fam].size > 1 ? fam + ' family' : fam;
    html += `<div class="chart-card half"><h3>${famLabel} — Interactive vs Total Throughput</h3><div class="chart-wrap"><canvas id="hero-${safeId}"></canvas></div></div>`;
    html += `<div class="chart-card half"><h3>${famLabel} — Concurrency Scaling</h3><div class="chart-wrap"><canvas id="scaling-${safeId}"></canvas></div></div>`;
  }
  html += '</div>';

  // Heatmap: Concurrency × ISL/OSL, one per model
  const heatModels = {};
  for (const [, cfg] of entries) {
    const mk = `${cfg.backend} · ${cfg.model}`;
    if (!heatModels[mk]) heatModels[mk] = { model: cfg.model, backend: cfg.backend, data: {} };
    const rk = cfg.islOsl;
    if (!heatModels[mk].data[rk]) heatModels[mk].data[rk] = {};
    if (cfg['Total Tput'] != null) heatModels[mk].data[rk][cfg.conc] = cfg['Total Tput'];
  }
  const heatConcs = [...state.filters.conc].sort((a, b) => a - b);
  for (const [mk, hm] of Object.entries(heatModels)) {
    const rowKeys = Object.keys(hm.data).sort();
    if (rowKeys.length < 1 || heatConcs.length < 2) continue;
    const allVals = rowKeys.flatMap(rk => heatConcs.map(c => hm.data[rk]?.[c]).filter(v => v != null));
    if (allVals.length < 3) continue;
    const minV = Math.min(...allVals), maxV = Math.max(...allVals), rangeV = maxV - minV || 1;
    html += `<div class="chart-card"><h3>${mk} — Throughput Heatmap (tok/s)</h3>`;
    html += '<table class="heatmap-table"><thead><tr><th>ISL/OSL</th>';
    for (const c of heatConcs) html += `<th>c=${c}</th>`;
    html += '</tr></thead><tbody>';
    for (const rk of rowKeys) {
      html += `<tr><td class="row-label">${fmtIslOsl(rk)}</td>`;
      for (const c of heatConcs) {
        const v = hm.data[rk]?.[c];
        if (v != null) {
          const ratio = (v - minV) / rangeV;
          const bg = `hsla(${Math.round(ratio * 120)}, 50%, 40%, 0.35)`;
          html += `<td style="background:${bg}">${fmtCompact(v, 0)}</td>`;
        } else {
          html += '<td style="color:var(--text-tertiary)">—</td>';
        }
      }
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  }

  container.innerHTML = html;

  // Per-family charts (e.g. DeepSeek base + mtp3 in same chart)
  for (let fi = 0; fi < tradeoffFamilies.length; fi++) {
    const fam = tradeoffFamilies[fi];
    const safeId = fi + '-' + fam.replace(/[^a-zA-Z0-9]/g, '');
    const famModels = [...familyMap[fam]].sort(_lc);
    const famConfigs = {};
    for (const [key, cfg] of entries) {
      if (famModels.includes(cfg.model)) famConfigs[key] = cfg;
    }

    // Interactive vs Total Throughput scatter — all variants in one chart
    const heroDS = [];
    for (const [sKey, s] of Object.entries(seriesMap)) {
      if (!famModels.includes(s.model) || s.points.length === 0) continue;
      const indices = s.points.map((_, i) => i).sort((a, b) => s.points[a].x - s.points[b].x);
      const color = getModelColor(s.backend, s.model);
      heroDS.push({
        label: `${s.backend} · ${modelVariant(s.model)} ${fmtIslOsl(s.islOsl)}`, data: indices.map(i => s.points[i]),
        borderColor: color.border, backgroundColor: color.bg,
        borderWidth: 2, pointRadius: 5, pointHoverRadius: 7, showLine: true, fill: false,
        _concLabels: indices.map(i => s.concLabels[i]), _configKeys: indices.map(i => s.configKeys[i])
      });
    }
    heroDS.sort((a, b) => a.label.localeCompare(b.label));
    const heroConcPlugin = {
      id: 'heroConcLabels_' + safeId,
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        ctx.save();
        ctx.font = '8px -apple-system, sans-serif';
        const focus = chart._legendFocusIndex;
        chart.data.datasets.forEach((ds, di) => {
          if (!ds._concLabels) return;
          const meta = chart.getDatasetMeta(di);
          ctx.globalAlpha = (focus != null && focus !== di) ? 0.12 : 1;
          ctx.fillStyle = ds.borderColor;
          meta.data.forEach((pt, pi) => {
            if (ds.data[pi] == null) return;
            ctx.fillText('c' + ds._concLabels[pi], pt.x + 5, pt.y - 5);
          });
        });
        ctx.restore();
      }
    };
    if (heroDS.length) {
      new Chart(document.getElementById('hero-' + safeId), {
        type: 'scatter', data: { datasets: heroDS },
        plugins: [heroConcPlugin],
        options: {
          responsive: true, maintainAspectRatio: false,
          layout: { padding: { top: 8, right: 12 } },
          plugins: {
            legend: heroDS.length <= 8 ? { labels: { color: C_LEGEND, font: { size: 10 }, boxWidth: 10 } } : { display: false },
            tooltip: { ...chartTooltipOpts(), callbacks: {
              title: (items) => {
                const ds = heroDS[items[0].datasetIndex];
                return ds.label + ' · c=' + (ds._concLabels[items[0].dataIndex] || '?');
              },
              label: (item) => [
                ` Interactive:  ${fmtNum(item.parsed.x, 1)} tok/s/user`,
                ` Total Tput:   ${fmtNum(item.parsed.y, 0)} tok/s/gpu`,
              ],
              afterBody: () => '\nClick for details'
            }}
          },
          scales: {
            x: { grid: chartGridOpts(), title: { display: true, text: 'Interactive (tok/s/user)', color: C_TICK }, ticks: { color: C_TICK }, grace: '5%' },
            y: { grid: chartGridOpts(), title: { display: true, text: 'Total Tput (tok/s/gpu)', color: C_TICK }, ticks: { color: C_TICK }, grace: '5%' }
          },
          onClick: (_e, elems) => {
            if (!elems.length) return;
            const ds = heroDS[elems[0].datasetIndex];
            const key = ds._configKeys?.[elems[0].index];
            if (key) { const cfg = latestConfigs[key]; if (cfg) showPopover(key, cfg); }
          }
        }
      });
    }

    // Concurrency Scaling — all variants in one chart
    buildConcurrencyScaling('scaling-' + safeId, famConfigs, fam, famModels);
  }
}

function buildSimpleScatter(canvasId, configs, xMetric, yMetric, xLabel, yLabel) {
  const seriesMap = {};
  for (const [key, cfg] of Object.entries(configs)) {
    const sKey = `${cfg.backend} · ${cfg.model} ${cfg.islOsl}`;
    if (!seriesMap[sKey]) seriesMap[sKey] = { backend: cfg.backend, model: cfg.model, points: [], concLabels: [], configKeys: [] };
    if (cfg[xMetric] != null && cfg[yMetric] != null) {
      seriesMap[sKey].points.push({ x: cfg[xMetric], y: cfg[yMetric] });
      seriesMap[sKey].concLabels.push(cfg.conc);
      seriesMap[sKey].configKeys.push(key);
    }
  }
  const datasets = [];
  for (const [sKey, s] of Object.entries(seriesMap)) {
    if (!s.points.length) continue;
    // Sort by x so lines don't zigzag
    const indices = s.points.map((_, i) => i).sort((a, b) => s.points[a].x - s.points[b].x);
    const color = getModelColor(s.backend, s.model);
    datasets.push({ label: sKey, data: indices.map(i => s.points[i]), borderColor: color.border, backgroundColor: color.bg, borderWidth: 2, pointRadius: 4, pointHoverRadius: 6, showLine: true, fill: false, _concLabels: indices.map(i => s.concLabels[i]), _configKeys: indices.map(i => s.configKeys[i]) });
  }
  if (!datasets.length) return;
  new Chart(document.getElementById(canvasId), {
    type: 'scatter', data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 8, right: 12 } },
      plugins: {
        legend: datasets.length <= 8 ? { labels: { color: C_LEGEND, font: { size: 10 }, boxWidth: 10 } } : { display: false },
        tooltip: { ...chartTooltipOpts(), callbacks: {
          title: (items) => datasets[items[0].datasetIndex].label,
          label: (item) => {
            const ds = datasets[item.datasetIndex];
            return ` c=${ds._concLabels[item.dataIndex] || '?'}: ${xLabel.split(' ')[0]}=${(+item.parsed.x).toFixed(1)}, ${yLabel.split(' ')[0]}=${(+item.parsed.y).toFixed(2)}`;
          },
          afterBody: () => '\nClick for details'
        }}
      },
      scales: {
        x: { grid: chartGridOpts(), title: { display: true, text: xLabel, color: C_TICK }, ticks: { color: C_TICK }, grace: '5%' },
        y: { grid: chartGridOpts(), title: { display: true, text: yLabel, color: C_TICK }, ticks: { color: C_TICK }, grace: '5%' }
      },
      onClick: (_e, elems) => {
        if (!elems.length) return;
        const ds = datasets[elems[0].datasetIndex];
        const key = ds._configKeys?.[elems[0].index];
        if (key) { const cfg = latestConfigs[key]; if (cfg) showPopover(key, cfg); }
      }
    }
  });
}

function buildConcurrencyScaling(canvasId, configs, familyName, famModels) {
  // Group by model+ISL/OSL, dual metric: throughput (left Y) + TPOT (right Y)
  if (!famModels) famModels = [familyName];
  const byKey = {}; // key: "model|islOsl"
  for (const [key, cfg] of Object.entries(configs)) {
    const sKey = `${cfg.backend}|${cfg.model}|${cfg.islOsl}`;
    if (!byKey[sKey]) byKey[sKey] = { backend: cfg.backend, model: cfg.model, islOsl: cfg.islOsl, tputPoints: [], tpotPoints: [], tputKeys: [], tpotKeys: [] };
    const gpuCount = cfg._gpu_count || 8;
    if (cfg['Total Tput'] != null) { byKey[sKey].tputPoints.push({ x: cfg.conc, y: cfg['Total Tput'] / gpuCount }); byKey[sKey].tputKeys.push(key); }
    if (cfg.TPOT != null) { byKey[sKey].tpotPoints.push({ x: cfg.conc, y: cfg.TPOT }); byKey[sKey].tpotKeys.push(key); }
  }

  const datasets = [];
  const seriesKeys = Object.keys(byKey).sort();
  const dashPatterns = [[], [6, 3], [2, 2], [8, 4, 2, 4]];

  for (let i = 0; i < seriesKeys.length; i++) {
    const s = byKey[seriesKeys[i]];
    const dash = dashPatterns[i % dashPatterns.length];
    const h = getModelHue(s.backend, s.model);
    const variantBits = [s.backend];
    if (famModels.length > 1) variantBits.push(modelVariant(s.model));
    variantBits.push(fmtIslOsl(s.islOsl));
    const variantLabel = variantBits.join(' ');
    // Throughput: use model color
    if (s.tputPoints.length) {
      const sorted = s.tputPoints.map((_, j) => j).sort((a, b) => s.tputPoints[a].x - s.tputPoints[b].x);
      datasets.push({
        label: `${variantLabel} Tput`, data: sorted.map(j => s.tputPoints[j]),
        borderColor: `hsl(${h}, 55%, 65%)`, backgroundColor: `hsla(${h}, 55%, 65%, 0.1)`,
        borderWidth: 2, borderDash: dash, pointRadius: 4, pointHoverRadius: 6,
        showLine: true, fill: false, tension: 0.2, yAxisID: 'y',
        _configKeys: sorted.map(j => s.tputKeys[j])
      });
    }
    // TPOT: use hue-shifted color
    if (s.tpotPoints.length) {
      const sorted = s.tpotPoints.map((_, j) => j).sort((a, b) => s.tpotPoints[a].x - s.tpotPoints[b].x);
      datasets.push({
        label: `${variantLabel} TPOT`, data: sorted.map(j => s.tpotPoints[j]),
        borderColor: `hsl(${(h + 120) % 360}, 45%, 65%)`, backgroundColor: `hsla(${(h + 120) % 360}, 45%, 65%, 0.1)`,
        borderWidth: 2, borderDash: dash, pointRadius: 3, pointHoverRadius: 5,
        showLine: true, fill: false, tension: 0.2, yAxisID: 'y2',
        pointStyle: 'triangle',
        _configKeys: sorted.map(j => s.tpotKeys[j])
      });
    }
  }
  if (!datasets.length) return;

  // Concurrency values for x-axis ticks
  const allConcs = [...new Set(Object.values(byKey).flatMap(s => [...s.tputPoints, ...s.tpotPoints].map(p => p.x)))].sort((a, b) => a - b);

  new Chart(document.getElementById(canvasId), {
    type: 'scatter', data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 8, right: 8 } },
      plugins: {
        legend: datasets.length <= 8 ? { labels: { color: C_LEGEND, font: { size: 10 }, boxWidth: 10, usePointStyle: true } } : { display: false },
        tooltip: { ...chartTooltipOpts(), callbacks: {
          title: (items) => {
            const ds = datasets[items[0].datasetIndex];
            return ds.label.replace(/ (Tput|TPOT)$/, '') + ' · c=' + items[0].parsed.x;
          },
          label: (item) => {
            const isTPOT = item.dataset.yAxisID === 'y2';
            return isTPOT
              ? ` TPOT:        ${fmtNum(item.parsed.y, 2)} ms`
              : ` Total Tput:  ${fmtNum(item.parsed.y, 1)} tok/s/gpu`;
          },
          afterBody: () => '\nClick for details'
        }}
      },
      scales: {
        x: {
          type: 'logarithmic',
          grid: chartGridOpts(),
          title: { display: true, text: 'Concurrency', color: C_TICK },
          ticks: { color: C_TICK, callback: function(v) { return allConcs.includes(v) ? v : ''; } },
          afterBuildTicks: function(axis) { axis.ticks = allConcs.map(v => ({ value: v })); }
        },
        y: {
          position: 'left', grid: chartGridOpts(),
          title: { display: true, text: 'Total Tput (tok/s/gpu)', color: C_TICK },
          ticks: { color: C_TICK }, grace: '5%'
        },
        y2: {
          position: 'right', grid: { drawOnChartArea: false },
          title: { display: true, text: 'TPOT (ms)', color: C_TICK },
          ticks: { color: C_TICK }, grace: '5%'
        }
      },
      onClick: (_e, elems) => {
        if (!elems.length) return;
        const ds = datasets[elems[0].datasetIndex];
        const key = ds._configKeys?.[elems[0].index];
        if (key) { const cfg = latestConfigs[key]; if (cfg) showPopover(key, cfg); }
      }
    }
  });
}

/* ================================================================
   11. TRENDS TAB
   ================================================================ */
function renderTrendsTab() {
  const container = document.getElementById('tab-trends');
  destroyChartsIn(container);

  // Mode+model selector — keeps native and ATOM-vLLM trend lines distinct
  const trendOptions = [...new Set(Object.values(latestConfigs)
    .filter(cfg => state.filters.backends.includes(cfg.backend) && state.filters.models.includes(cfg.model))
    .map(cfg => `${cfg.backend}|${cfg.model}`))]
    .sort((a, b) => _lc(a.split('|')[1], b.split('|')[1]));
  if (!trendOptions.includes(state.trendModelKey)) state.trendModelKey = trendOptions[0] || '';

  let html = '';
  // Only show selector when there are multiple mode/model pairs to choose from
  if (trendOptions.length > 1) {
    html += '<div class="model-selector"><span class="sel-label">Model:</span>';
    for (const trendKey of trendOptions) {
      const [backend, model] = trendKey.split('|');
      const _tc = getModelColor(backend, model);
      const _tActive = trendKey === state.trendModelKey;
      html += `<button class="sel-btn ${_tActive ? 'active' : ''}" data-trend-key="${trendKey}" style="border-color:${_tc.border};color:${_tActive ? '#fff' : _tc.text};${_tActive ? 'background:' + _tc.border : ''}">${backend} · ${model}</button>`;
    }
    html += '</div>';
  }
  html += '<div class="chart-grid" id="trend-charts"></div>';
  container.innerHTML = html;

  container.querySelectorAll('.sel-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.trendModelKey = btn.dataset.trendKey;
      renderTrendsTab();
    });
  });

  if (!state.trendModelKey) return;
  const [trendBackend, trendModel] = state.trendModelKey.split('|');

  // Build ordered x-axis: use date as primary key (not commit ID)
  // Each run gets a unique index; x-axis shows short date labels
  const runsAsc = [...allRuns].reverse();
  const seen = new Set();
  const orderedRuns = []; // [{cid, date, label}]
  for (const r of runsAsc) {
    const cid = r.commit.id.slice(0, 7);
    if (!seen.has(cid)) {
      seen.add(cid);
      const d = new Date(r.date);
      orderedRuns.push({ cid, date: r.date, label: (d.getMonth()+1) + '/' + d.getDate() + ' ' + cid });
    }
  }
  const orderedLabels = orderedRuns.map(r => r.label);
  const commitDateMap = {}; const labelToCid = {};
  orderedRuns.forEach(r => { commitDateMap[r.label] = r.date; labelToCid[r.label] = r.cid; });

  const metrics = [
    { key: 'Total Tput', title: 'Total Throughput', unit: 'tok/s' },
    { key: 'throughput', title: 'Output Throughput', unit: 'tok/s' },
    { key: 'TPOT', title: 'Time Per Output Token', unit: 'ms' },
    { key: 'TTFT', title: 'Time To First Token', unit: 'ms' },
  ];

  const grid = document.getElementById('trend-charts');

  for (const met of metrics) {
    const card = document.createElement('div');
    card.className = 'chart-card';
    card.innerHTML = `<h3>${trendBackend} · ${trendModel} — ${met.title}</h3>`;
    const wrap = document.createElement('div');
    wrap.className = 'chart-wrap';
    const canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    card.appendChild(wrap);
    grid.appendChild(card);

    // Find all configs for this model
    const datasets = [];
    for (const [key, history] of Object.entries(historyMap)) {
      if (!key.startsWith(state.trendModelKey + '|')) continue;
      const parts = key.split('|');
      // Respect global ISL/OSL and Concurrency filters
      if (!state.filters.islOsl.includes(parts[2])) continue;
      if (!state.filters.conc.includes(+parts[3])) continue;
      const seriesLabel = fmtIslOsl(parts[2]) + ' c=' + parts[3];
      const color = getModelColor(trendBackend, trendModel);

      const pointMap = {};
      for (const pt of history) {
        const cid = pt.commit.id.slice(0, 7);
        // Map to the label that contains this commit ID
        const matchLabel = orderedRuns.find(r => r.cid === cid)?.label;
        if (matchLabel && pt[met.key] != null) pointMap[matchLabel] = pt[met.key];
      }
      const data = orderedLabels.map(lbl => pointMap[lbl] != null ? pointMap[lbl] : null);
      if (data.every(v => v === null)) continue;

      datasets.push({
        label: seriesLabel, data,
        borderColor: color.border, backgroundColor: color.bg,
        borderWidth: 2, pointRadius: 3, pointHoverRadius: 5, fill: false, spanGaps: true, tension: 0.1,
        _configKey: key, _pointMap: pointMap, _conc: parts[3]
      });
    }

    // Sort by ISL/OSL then concurrency (numeric)
    datasets.sort((a, b) => {
      const ka = a._configKey.split('|'), kb = b._configKey.split('|');
      return ka[1].localeCompare(kb[1]) || (+ka[2]) - (+kb[2]);
    });

    if (datasets.length === 0) {
      card.innerHTML += '<div class="chart-empty">No historical data for this mode/model and metric.</div>';
      continue;
    }
    if (datasets.length > 8) {
      const note = document.createElement('div');
      note.style.cssText = 'font-size:11px;color:var(--text-tertiary);margin-bottom:4px';
      note.textContent = `${datasets.length} configs — hover to identify, use filters to narrow down`;
      card.insertBefore(note, wrap);
    }

    // Plugin: draw concurrency labels at last data point (Total Tput only)
    const concLabelPlugin = met.key === 'Total Tput' && datasets.length <= 12 ? {
      id: 'concLabels_' + Math.random(),
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        ctx.save();
        ctx.font = '9px -apple-system, sans-serif';
        ctx.textAlign = 'left';
        const focus = chart._legendFocusIndex;
        chart.data.datasets.forEach((ds, di) => {
          if (!ds._conc) return;
          const meta = chart.getDatasetMeta(di);
          ctx.globalAlpha = (focus != null && focus !== di) ? 0.12 : 1;
          // Find last visible (non-null) point
          for (let i = meta.data.length - 1; i >= 0; i--) {
            if (ds.data[i] != null) {
              const pt = meta.data[i];
              ctx.fillStyle = ds.borderColor;
              ctx.fillText('c' + ds._conc, pt.x + 6, pt.y + 3);
              break;
            }
          }
        });
        ctx.restore();
      }
    } : null;

    new Chart(canvas, {
      type: 'line', data: { labels: orderedLabels, datasets },
      plugins: concLabelPlugin ? [concLabelPlugin] : [],
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 8, right: concLabelPlugin ? 50 : 8 } },
        plugins: {
          legend: datasets.length <= 8
            ? { labels: { color: C_LEGEND, font: { size: 10 }, boxWidth: 10 } }
            : { display: false },
          tooltip: { ...chartTooltipOpts(), callbacks: {
            title: (items) => {
              const ds = items[0].dataset;
              const lbl = orderedLabels[items[0].dataIndex];
              return ds.label + ' · ' + (labelToCid[lbl] || '');
            },
            label: (item) => {
              const lbl = orderedLabels[item.dataIndex];
              return [
                ` ${met.title}:  ${fmtNum(item.raw, met.key === 'TPOT' ? 2 : 1)} ${met.unit}`,
                ` Date:  ${fmtDate(commitDateMap[lbl])}`
              ];
            },
            afterBody: () => '\nClick to trace'
          }},
          datalabels: { display: false }
        },
        scales: {
          x: { grid: chartGridOpts(), title: { display: true, text: 'Commit', color: C_TICK }, ticks: { color: C_TICK } },
          y: { grid: chartGridOpts(), title: { display: true, text: met.unit, color: C_TICK }, ticks: { color: C_TICK } }
        },
        onClick: (_e, elems) => {
          if (!elems.length) return;
          const ds = datasets[elems[0].datasetIndex];
          const lbl = orderedLabels[elems[0].index];
          const cid = labelToCid[lbl];
          const run = cid ? allRuns.find(r => r.commit.id.slice(0, 7) === cid) : null;
          if (run && ds._configKey) switchToTrace(ds._configKey, run.date);
        }
      }
    });
  }
}

function renderDataTab() {
  const container = document.getElementById('tab-data');
  destroyChartsIn(container);

  let html = '<div style="display:flex;align-items:center;gap:var(--gap-sm);margin-bottom:var(--gap-md);flex-wrap:wrap">';
  html += '<div class="view-toggle">';
  html += `<button class="${state.dataView === 'table' ? 'active' : ''}" data-view="table">Table View</button>`;
  html += `<button class="${state.dataView === 'timeline' ? 'active' : ''}" data-view="timeline">Timeline View</button>`;
  html += '</div><button class="action-btn" id="copy-csv-btn" style="margin-left:auto">Copy CSV</button></div>';

  if (state.dataView === 'table') {
    html += renderDataTable();
  } else {
    html += renderTimeline();
  }
  container.innerHTML = html;

  // View toggle
  container.querySelectorAll('.view-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.dataView = btn.dataset.view;
      renderDataTab();
    });
  });

  // Copy CSV
  const csvBtn = document.getElementById('copy-csv-btn');
  if (csvBtn) {
    csvBtn.addEventListener('click', () => {
      const header = 'Date,Commit,Mode,Model,ISL/OSL,Concurrency,TP,Total Throughput (tok/s),TPOT (ms),TTFT (ms),Run URL';
      const rows = [];
      for (const run of allRuns) {
        const configs = parseRunConfigs(run);
        for (const [, cfg] of Object.entries(configs)) {
          if (!state.filters.backends.includes(cfg.backend)) continue;
          if (!state.filters.models.includes(cfg.model)) continue;
          if (!state.filters.islOsl.includes(cfg.islOsl)) continue;
          if (!state.filters.conc.includes(cfg.conc)) continue;
          rows.push([fmtDate(cfg.date), cfg.commit.id?.slice(0,7), cfg.backend, cfg.model, cfg.islOsl, cfg.conc,
            cfg._gpu_count ?? '', cfg['Total Tput'] ?? '', cfg.TPOT ?? '', cfg.TTFT ?? '', cfg.runUrl].join(','));
        }
      }
      navigator.clipboard.writeText(header + '\n' + rows.join('\n'));
      csvBtn.textContent = 'Copied!';
      setTimeout(() => { csvBtn.textContent = 'Copy CSV'; }, 1500);
    });
  }

  // Column sorting for table headers
  if (state.dataView === 'table') {
    container.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (state.dataSort.column === col) { state.dataSort.direction = state.dataSort.direction === 'asc' ? 'desc' : 'asc'; }
        else { state.dataSort.column = col; state.dataSort.direction = col === 'date' ? 'desc' : 'asc'; }
        renderDataTab();
      });
    });
    container.querySelectorAll('tr.detail-row').forEach(dr => {
      dr.addEventListener('click', (e) => e.stopPropagation());
    });
    container.querySelectorAll('tr[data-key]').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('a') || e.target.closest('button')) return;
        const detail = container.querySelector(`tr[data-detail="${row.dataset.key}"]`);
        if (detail) { detail.classList.toggle('expanded'); row.classList.toggle('row-open'); }
      });
    });
  }

  // Timeline expand
  container.querySelectorAll('.tl-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const details = btn.closest('.tl-node').querySelector('.tl-details');
      if (details) {
        details.classList.toggle('expanded');
        btn.textContent = details.classList.contains('expanded') ? 'Hide Details' : 'Show Details';
      }
    });
  });

  // Fixed table header (only for main table, not timeline sub-tables)
  if (state.dataView === 'table') { syncHeaderH(); bindFixedThead(container); }
}

function renderDataTable() {
  const rows = [];
  for (const run of allRuns) {
    const configs = parseRunConfigs(run);
    for (const [key, cfg] of Object.entries(configs)) {
      if (!state.filters.backends.includes(cfg.backend)) continue;
      if (!state.filters.models.includes(cfg.model)) continue;
      if (!state.filters.islOsl.includes(cfg.islOsl)) continue;
      if (!state.filters.conc.includes(cfg.conc)) continue;
      rows.push({ key, cfg, runDate: run.date });
    }
  }
  const { column, direction } = state.dataSort;
  const dir = direction === 'asc' ? 1 : -1;
  rows.sort((a, b) => {
    switch (column) {
      case 'date': return dir * (a.cfg.date - b.cfg.date);
      case 'commit': return dir * (a.cfg.commit.id || '').localeCompare(b.cfg.commit.id || '');
      case 'mode': return dir * (a.cfg.backend || '').localeCompare(b.cfg.backend || '');
      case 'model': return dir * a.cfg.model.localeCompare(b.cfg.model);
      case 'islOsl': return dir * a.cfg.islOsl.localeCompare(b.cfg.islOsl);
      case 'conc': return dir * (a.cfg.conc - b.cfg.conc);
      case 'tp': return dir * ((a.cfg._gpu_count || 0) - (b.cfg._gpu_count || 0));
      case 'gpu': return dir * (a.cfg._gpu_name || '').localeCompare(b.cfg._gpu_name || '');
      case 'totalTput': return dir * ((a.cfg['Total Tput'] || 0) - (b.cfg['Total Tput'] || 0));
      case 'tpot': return dir * ((a.cfg.TPOT || 0) - (b.cfg.TPOT || 0));
      case 'ttft': return dir * ((a.cfg.TTFT || 0) - (b.cfg.TTFT || 0));
      default: return dir * (a.cfg.date - b.cfg.date);
    }
  });
  const sCls = (col) => 'sortable' + (state.dataSort.column === col ? ' sort-' + state.dataSort.direction : '');
  const sIco = (col) => '<span class="sort-icon">' + (state.dataSort.column === col ? (state.dataSort.direction === 'asc' ? '▲' : '▼') : '⇕') + '</span>';
  let html = `<div class="table-watermark"><table class="perf-table"><thead><tr>
    <th class="${sCls('date')}" data-sort="date">Date ${sIco('date')}</th>
    <th class="${sCls('commit')}" data-sort="commit">Commit ${sIco('commit')}</th>
    <th class="${sCls('mode')}" data-sort="mode">Mode ${sIco('mode')}</th>
    <th class="${sCls('model')}" data-sort="model">Model ${sIco('model')}</th>
    <th class="${sCls('islOsl')}" data-sort="islOsl">ISL/OSL ${sIco('islOsl')}</th>
    <th class="num ${sCls('conc')}" data-sort="conc">Conc ${sIco('conc')}</th>
    <th class="num ${sCls('tp')}" data-sort="tp">TP ${sIco('tp')}</th>
    <th class="${sCls('gpu')}" data-sort="gpu">GPU ${sIco('gpu')}</th>
    <th class="num ${sCls('totalTput')}" data-sort="totalTput">Total Throughput (tok/s) ${sIco('totalTput')}</th>
    <th class="num ${sCls('tpot')}" data-sort="tpot">TPOT (ms) ${sIco('tpot')}</th>
    <th class="num ${sCls('ttft')}" data-sort="ttft">TTFT (ms) ${sIco('ttft')}</th>
    <th>Run</th>
  </tr></thead><tbody>`;
  for (const { key, cfg, runDate } of rows) {
    const commitId = cfg.commit.id ? cfg.commit.id.slice(0, 7) : '';
    html += `<tr data-key="data-${key}-${runDate}">
      <td>${fmtDate(cfg.date)}</td>
      <td>${safeHref(cfg.commit.url) ? `<a href="${escHTML(safeHref(cfg.commit.url))}" target="_blank" rel="noopener noreferrer">${commitId}</a>` : commitId}</td>
      <td style="white-space:nowrap">${escHTML(cfg.backend)}</td>
      <td class="model-name" style="color:${getModelColor(cfg.backend, cfg.model).text}">${escHTML(cfg.model)}</td>
      <td>${fmtIslOsl(cfg.islOsl)}</td>
      <td class="num">${cfg.conc}</td>
      <td class="num">${cfg._gpu_count || '—'}</td>
      <td style="white-space:nowrap;font-size:11px">${cfg._gpu_count ? cfg._gpu_count + '× ' : ''}${escHTML(cfg._gpu_name || '—')}</td>
      <td class="num">${cfg['Total Tput'] != null ? fmtNum(cfg['Total Tput'], 1) : '—'}</td>
      <td class="num">${cfg.TPOT != null ? fmtNum(cfg.TPOT, 2) : '—'}</td>
      <td class="num">${cfg.TTFT != null ? fmtNum(cfg.TTFT, 1) : '—'}</td>
      <td>${safeHref(cfg.runUrl) ? `<a href="${escHTML(safeHref(cfg.runUrl))}" target="_blank" rel="noopener noreferrer">view</a>` : '—'}</td>
    </tr>`;
    html += `<tr class="detail-row" data-detail="data-${key}-${runDate}"><td colspan="12">${buildDetailHTML(key, cfg)}</td></tr>`;
  }
  html += '</tbody></table></div>';
  return html;
}

  html += '</div>';
  return html;

  const interactive = cfg.TPOT && cfg.TPOT > 0 ? 1000 / cfg.TPOT : null;
  const prevInteractive = prev?.TPOT && prev.TPOT > 0 ? 1000 / prev.TPOT : null;
  const metricsRows = [
    ['Total Throughput', cfg['Total Tput'], 'tok/s', prev?.['Total Tput'], false],
    ['Output Throughput', cfg.throughput, 'tok/s', prev?.throughput, false],

/* ================================================================
   15. URL HASH SYNC
   ================================================================ */
let hashUpdateFromCode = false;
function syncToHash() {
  const parts = [];
  if (state.filters.backends.length !== allBackends.length) parts.push('backend=' + state.filters.backends.join(','));
  if (state.filters.models.length !== allModels.length) parts.push('model=' + state.filters.models.join(','));
  if (state.filters.islOsl.length !== allIslOsl.length) parts.push('isl=' + state.filters.islOsl.join(','));
  if (state.filters.conc.length !== allConc.length) parts.push('conc=' + state.filters.conc.join(','));
  if (state.activeTab !== 'performance') parts.push('tab=' + state.activeTab);
  hashUpdateFromCode = true;
  window.location.hash = parts.join('&');
}

function readFromHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  for (const part of hash.split('&')) {
    const [k, v] = part.split('=');
    if (!v) continue;
    if (k === 'backend') state.filters.backends = v.split(',').filter(b => allBackends.includes(b));
    if (k === 'model') state.filters.models = v.split(',').filter(m => allModels.includes(m));
    if (k === 'isl') state.filters.islOsl = v.split(',').filter(i => allIslOsl.includes(i));
    if (k === 'conc') state.filters.conc = v.split(',').map(Number).filter(c => allConc.includes(c));
    if (k === 'tab') {
      state.activeTab = v;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === v));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === 'tab-' + v));
    }
  }
}

function renderAccuracyTab() {
  const container = document.getElementById('tab-accuracy');
  if (!hasAccuracyData) {
    container.innerHTML = '<p style="color:var(--text-tertiary);padding:var(--gap-lg)">No accuracy data available yet. Accuracy data will appear after CI accuracy tests run on the main branch.</p>';
    return;
  }
  // Not filtered by model/backend — accuracy tab always shows all models
  const models = Object.entries(latestAccuracy)
    .sort((a, b) => _lc(a[0].split('|')[1], b[0].split('|')[1]));

  let html = `
    <h3 style="color:var(--text-primary);margin-bottom:var(--gap-md)">Model Accuracy (GSM8K)</h3>
    <div class="table-watermark">
      <table class="perf-table">
        <thead><tr>
          <th>Backend</th><th>Model</th>
          <th class="num">flexible-extract</th><th class="num">strict-match</th>
          <th class="num">Baseline</th><th class="num">Recovery</th>
          <th class="num">Threshold</th><th class="num">Margin</th><th>Status</th>
          <th>Trend</th><th>Fewshot</th><th>Last Tested</th><th>Run</th>
        </tr></thead>
        <tbody>`;

  for (const [key, acc] of models) {
    const [backend, model] = key.split('|');
    const history = accuracyMap[key];
    const prev = history.length > 1 ? history[1] : null;
    const threshold = acc.threshold || 0;
    const hasThreshold = !!acc.threshold;
    const margin = acc.score - threshold;
    const marginClass = !hasThreshold ? 'trend-neutral' : margin >= 0.05 ? 'trend-up' : margin >= 0 ? 'trend-neutral' : 'trend-down';
    const status = hasThreshold ? (margin >= 0 ? '✓ Pass' : '✗ Fail') : '—';
    const statusClass = !hasThreshold ? 'trend-neutral' : margin >= 0 ? 'trend-up' : 'trend-down';
    const reg = accuracyRegressions[key];
    const regClass = reg ? (reg.severity === 'critical' ? 'regression' : 'regression-warning') : '';
    const dateStr = fmtDate(acc.date);
    const href = safeHref(acc.runUrl);

    html += `
      <tr class="${regClass}" data-acc-key="${escHTML(key)}">
        <td style="white-space:nowrap">${escHTML(backend)}</td>
        <td style="font-weight:600;color:var(--text-primary)">${escHTML(model)}</td>
        <td class="num" style="font-weight:700;color:var(--text-primary)">${fmtNum(acc.score, 4)}</td>
        <td class="num">${acc.strictMatch != null ? fmtNum(acc.strictMatch, 4) : '—'}</td>
        <td class="num">${acc.baseline > 0 ? fmtNum(acc.baseline, 4) : '—'}</td>
        <td class="num">${acc.baseline > 0 ? '<span class="' + (acc.score / acc.baseline >= 0.98 ? 'trend-up' : acc.score / acc.baseline >= 0.95 ? 'trend-neutral' : 'trend-down') + '">' + (acc.score / acc.baseline * 100).toFixed(1) + '%</span>' : '—'}</td>
        <td class="num">${hasThreshold ? fmtNum(threshold, 4) : '—'}</td>
        <td class="num"><span class="${marginClass}">${hasThreshold ? (margin >= 0 ? '+' : '') + fmtNum(margin, 4) : '—'}</span></td>
        <td><span class="${statusClass}">${status}</span></td>
        <td>${trendHTML(acc.score, prev?.score, false)}</td>
        <td class="num">${acc.fewshot != null ? acc.fewshot : '—'}</td>
        <td>${dateStr}</td>
        <td>${href ? `<a href="${escHTML(href)}" target="_blank" rel="noopener noreferrer">→</a>` : '—'}</td>
      </tr>`;

    // Detail row with inline trend chart
    const canvasId = 'acc-trend-' + key.replace(/[^a-zA-Z0-9]/g, '_');
    html += `<tr class="detail-row" data-detail-acc="${escHTML(key)}"><td colspan="13"><div class="detail-inner" style="display:flex;gap:var(--gap-lg);flex-wrap:wrap;align-items:flex-start">`;
    // Left: trend chart
    html += `<div style="flex:1;min-width:280px"><canvas id="${canvasId}" style="height:180px"></canvas></div>`;
    // Right: info
    html += `<div style="flex:0 0 auto;min-width:200px">`;
    if (acc.baselineModel || acc.baselineNote) {
      html += `<div class="detail-section"><h4>Baseline</h4>`;
      if (acc.baselineModel) html += `<p style="color:var(--text-secondary)">${escHTML(acc.baselineModel)}<br>score: ${acc.baseline > 0 ? fmtNum(acc.baseline, 4) : '—'}</p>`;
      if (acc.baselineNote) html += `<p style="color:var(--text-tertiary);font-size:11px;margin-top:4px;font-style:italic">${escHTML(acc.baselineNote)}</p>`;
      html += `</div>`;
    }
    if (reg) {
      html += `<div class="detail-section"><h4>Regression</h4><p>flexible-extract dropped by ${fmtNum(reg.dropAbs, 4)} (${fmtNum(reg.dropPct, 1)}%) from ${fmtNum(reg.prev.score, 4)}</p></div>`;
    }
    html += `</div></div></td></tr>`;
  }

  html += '</tbody></table></div>';

  container.innerHTML = html;

  // Track per-row chart instances to avoid duplicates
  const accCharts = {};

  // Row expand/collapse — render chart on first expand
  container.querySelectorAll('tr[data-acc-key]').forEach(row => {
    row.style.cursor = 'pointer';
    row.addEventListener('click', () => {
      const key = row.dataset.accKey;
      const detail = container.querySelector(`tr[data-detail-acc="${key}"]`);
      if (!detail) return;
      const expanding = !detail.classList.contains('expanded');
      detail.classList.toggle('expanded');
      row.classList.toggle('row-open');
      if (expanding && !accCharts[key]) {
        requestAnimationFrame(() => renderAccuracyMiniChart(key, accCharts));
      }
    });
  });
}

function renderAccuracyMiniChart(key, chartCache) {
  const canvasId = 'acc-trend-' + key.replace(/[^a-zA-Z0-9]/g, '_');
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const history = accuracyMap[key];
  if (!history || !history.length) return;
  const [backend, model] = key.split('|');
  const color = getModelColor(backend, model);

  // Build data sorted ascending by date
  const sorted = [...history].sort((a, b) => a.date - b.date);
  const labels = sorted.map(h => {
    const dt = new Date(h.date);
    return `${dt.getMonth()+1}/${dt.getDate()}`;
  });
  const scores = sorted.map(h => h.score);
  const strictScores = sorted.map(h => h.strictMatch ?? null);
  const hasStrict = strictScores.some(v => v != null);

  // Baseline reference line
  const baseline = sorted[0].baseline ?? (Object.entries(latestAccuracy).find(([k]) => k === key)?.[1]?.baseline);

  const datasets = [
    {
      label: 'flexible-extract',
      data: scores,
      borderColor: color.border,
      backgroundColor: color.bg,
      borderWidth: 2,
      pointRadius: 4,
      pointHoverRadius: 6,
      tension: 0.3,
      spanGaps: true,
      fill: false,
    },
  ];
  if (hasStrict) {
    datasets.push({
      label: 'strict-match',
      data: strictScores,
      borderColor: color.border,
      backgroundColor: color.bg,
      borderWidth: 1.5,
      borderDash: [4, 3],
      pointRadius: 3,
      pointHoverRadius: 5,
      tension: 0.3,
      spanGaps: true,
      fill: false,
    });
  }

  const allVals = scores.concat(strictScores.filter(v => v != null));
  const yMin = Math.max(0, Math.floor((Math.min(...allVals) - 0.03) * 20) / 20);

  // Baseline reference line plugin
  const baselinePlugin = baseline ? {
    id: 'baselineLine_' + canvasId,
    afterDraw(chart) {
      const yScale = chart.scales.y;
      const yPx = yScale.getPixelForValue(baseline);
      if (yPx < yScale.top || yPx > yScale.bottom) return;
      const ctx = chart.ctx;
      ctx.save();
      ctx.strokeStyle = 'rgba(136,153,184,0.5)';
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 4]);
      ctx.beginPath();
      ctx.moveTo(chart.chartArea.left, yPx);
      ctx.lineTo(chart.chartArea.right, yPx);
      ctx.stroke();
      ctx.fillStyle = C_TICK;
      ctx.font = '10px sans-serif';
      ctx.fillText('baseline ' + fmtNum(baseline, 4), chart.chartArea.right - 80, yPx - 4);
      ctx.restore();
    }
  } : null;

  chartCache[key] = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    plugins: baselinePlugin ? [baselinePlugin] : [],
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: C_LEGEND, font: { size: 10 }, boxWidth: 10 } },
        tooltip: { ...chartTooltipOpts(), callbacks: {
          title: (items) => model + ' · ' + labels[items[0].dataIndex],
          label: (item) => ` ${item.dataset.label}: ${fmtNum(item.raw, 4)}  (${(item.raw * 100).toFixed(1)}%)`,
        }},
        datalabels: { display: false },
      },
      scales: {
        x: { grid: chartGridOpts(), ticks: { color: C_TICK, font: { size: 10 } } },
        y: {
          min: yMin, suggestedMax: 1,
          grid: chartGridOpts(),
          ticks: { color: C_TICK, callback: v => (v * 100).toFixed(0) + '%' },
        },
      },
    },
  });
}

/* ================================================================
   17. INIT
   ================================================================ */
readFromHash();
renderFilters();
renderKPICards();
renderActiveTab();

syncHeaderH();

// Browser back/forward — re-apply hash state (skip if we triggered it ourselves)
window.addEventListener('hashchange', () => {
  if (hashUpdateFromCode) { hashUpdateFromCode = false; return; }
  readFromHash();
  renderFilters();
  renderKPICards();
  renderActiveTab();
});
})();
</script>
