name: ATOM vLLM OOT Test

on:
  pull_request:
    branches: [main]  # Triggers on PRs targeting `main`
    types: [opened, synchronize, reopened, ready_for_review, closed]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  schedule:
    # Nightly at 02:00 Beijing time (18:00 UTC on the previous day)
    - cron: '0 18 * * *'
  workflow_dispatch:
    # Manual runs use GitHub Actions' built-in branch dropdown ("Use workflow
    # from") as the ATOM branch selector, so users do not need to type branch
    # names.
    inputs:
      run_qwen3_moe_tp8:
        description: "Qwen3-235B-A22B-Instruct-2507-FP8 TP8+EP8"
        required: false
        type: boolean
        default: false
      run_qwen3_next_80b_tp4:
        description: "Qwen3-Next-80B-A3B-Instruct-FP8 TP4"
        required: false
        type: boolean
        default: false
      run_qwen35_397b_fp8_tp8:
        description: "Qwen3.5-397B-A17B-FP8 TP8"
        required: false
        type: boolean
        default: false
      run_qwen35_397b_tp8:
        description: "Qwen3.5-397B-A17B TP8"
        required: false
        type: boolean
        default: false
      run_kimi_k2_tp8:
        description: "Kimi-K2-Thinking-MXFP4 TP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp8_tp8:
        description: "DeepSeek-R1-FP8 TP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp8:
        description: "DeepSeek-R1-0528-MXFP4 TP8"
        required: false
        type: boolean
        default: false
      run_gpt_oss_120b_tp1:
        description: "gpt-oss-120b TP1"
        required: false
        type: boolean
        default: false
      run_gpt_oss_120b_tp2:
        description: "gpt-oss-120b TP2"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  ATOM_BASE_NIGHTLY_IMAGE: rocm/atom-dev:latest
  OOT_IMAGE_CACHE_KEEP: "3"
  GITHUB_REPO_URL: ${{ github.event.pull_request.head.repo.clone_url || 'https://github.com/ROCm/ATOM.git' }}
  GITHUB_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.event.head_commit.id || github.sha }}
  NIGHTLY_OOT_IMAGE_TAG: rocm/atom-dev:vllm-latest
  VALIDATION_IMAGE_REPO: rocm/atom-dev
  GPU_ARCH: "gfx942;gfx950"
  AITER_REPO: "https://github.com/ROCm/aiter.git"
  AITER_COMMIT: "HEAD"
  VLLM_COMMIT: "b31e9326a7d9394aab8c767f8ebe225c65594b60"

jobs:
  # ---------- OOT CI path (pull_request only) ----------
  check-signal:
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false }}
    name: Check Pre Checkin Signal
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Download and check pre-checkin signal
        run: bash ./.github/scripts/check_signal.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

  build_oot_image:
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false }}
    needs: [check-signal]
    name: Build OOT image
    runs-on: build-only-atom
    env:
      VLLM_COMMIT: b31e9326a7d9394aab8c767f8ebe225c65594b60
    steps:
      - name: Checkout ATOM repo
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        uses: actions/checkout@v6

      - name: Generate OOT base Dockerfile
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          cat <<EOF > Dockerfile.mod
          FROM ${{ env.ATOM_BASE_NIGHTLY_IMAGE }}
          RUN pip install -U lm-eval[api]
          RUN pip show lm-eval || true
          RUN pip install hf_transfer
          RUN pip show hf_transfer || true
          RUN echo "=== Aiter version BEFORE uninstall ===" && pip show amd-aiter || true
          RUN pip uninstall -y amd-aiter
          RUN pip install --upgrade "pybind11>=3.0.1"
          RUN pip show pybind11
          RUN rm -rf /app/aiter-test
          RUN git clone --depth 1 https://github.com/ROCm/aiter.git /app/aiter-test && \\
              cd /app/aiter-test && \\
              git checkout HEAD && \\
              git submodule sync && git submodule update --init --recursive && \\
              MAX_JOBS=64 PREBUILD_KERNELS=0 GPU_ARCHS=gfx950 python3 setup.py develop
          RUN echo "=== Aiter version AFTER installation ===" && pip show amd-aiter || true
          RUN echo "=== ATOM version BEFORE uninstall ===" && pip show atom || true
          RUN pip uninstall -y atom
          RUN rm -rf /app/ATOM
          RUN git clone ${{ env.GITHUB_REPO_URL }} /app/ATOM && \\
              cd /app/ATOM && \\
              git checkout ${{ env.GITHUB_COMMIT_SHA }} && \\
              pip install -e .
          RUN echo "=== ATOM version AFTER installation ===" && pip show atom || true
          EOF

      - name: Build OOT base image
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          docker build --pull --network=host \
            --no-cache \
            -t atom_oot_base:ci \
            -f Dockerfile.mod .

      - name: Build OOT vLLM image
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          docker build --network=host \
            --no-cache \
            -t atom_oot:ci \
            --target atom_oot \
            --build-arg OOT_BASE_IMAGE="atom_oot_base:ci" \
            --build-arg MAX_JOBS=64 \
            --build-arg VLLM_COMMIT="${VLLM_COMMIT}" \
            --build-arg INSTALL_LM_EVAL=1 \
            --build-arg INSTALL_FASTSAFETENSORS=1 \
            -f docker/Dockerfile .

      - name: Push Docker image
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          IMAGE_TAG=rocm/atom-dev:oot-pre-build-${{ env.GITHUB_COMMIT_SHA }}
          docker tag atom_oot:ci $IMAGE_TAG
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker push $IMAGE_TAG

      - name: Clean up build images
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && always() }}
        run: |
          docker rmi "atom_oot_base:ci" || true
          docker rmi "atom_oot:ci" || true
          docker rmi "rocm/atom-dev:oot-pre-build-${{ env.GITHUB_COMMIT_SHA }}" || true

  atom-vllm-oot:
    needs: [check-signal, build_oot_image]
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false }}
    name: ATOM vLLM OOT Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_name: "DeepSeek-R1-FP8"
            model_path: "deepseek-ai/DeepSeek-R1-0528"
            extra_args: "--tensor-parallel-size 8"
            env_vars: ""
            accuracy_test_threshold: 0.93
            runner: atom-mi355-8gpu.predownload
          - model_name: "gpt-oss-120b"
            model_path: "openai/gpt-oss-120b"
            extra_args: "--tensor-parallel-size 1"
            env_vars: "ATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=1"
            accuracy_test_threshold: 0.38
            runner: linux-atom-mi35x-1
          - model_name: "Kimi-K2-Thinking-MXFP4"
            model_path: "amd/Kimi-K2-Thinking-MXFP4"
            extra_args: "--tensor-parallel-size 4"
            env_vars: ""
            accuracy_test_threshold: 0.90
            runner: linux-atom-mi35x-4
          - model_name: "Qwen3.5-35B-A3B-FP8"
            model_path: "Qwen/Qwen3.5-35B-A3B-FP8"
            extra_args: "--tensor-parallel-size 2"
            # FIXME: Remove these temporary Qwen3.5 workarounds after the
            # aiter fix landed
            env_vars: |
              ATOM_DISABLE_VLLM_PLUGIN_ATTENTION=1
              ATOM_USE_CUSTOM_ALL_GATHER=0
            accuracy_test_threshold: 0.76
            runner: linux-atom-mi35x-4
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    env:
      CONTAINER_NAME: atom_vllm_oot_${{ strategy.job-index }}
      VLLM_COMMIT: b31e9326a7d9394aab8c767f8ebe225c65594b60
      VLLM_VERSION: "0.17"

    steps:
      - name: Clean up containers and workspace
        if: matrix.runner == 'atom-mi355-8gpu.predownload'
        run: |
          echo "=== Cleaning up containers on $(hostname) ==="
          containers=$(docker ps -q)
          if [ -n "$containers" ]; then
            docker kill $containers || true
          fi
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          docker run --rm -v "${GITHUB_WORKSPACE:-$PWD}":/workspace -w /workspace --privileged rocm/pytorch:latest bash -lc "ls -la /workspace/ && find /workspace -mindepth 1 -delete" || true

      - name: Checkout ATOM repo
        uses: actions/checkout@v4

      - name: Set HF_TOKEN
        run: echo "HF_TOKEN=${HF_TOKEN:-${{ secrets.AMD_HF_TOKEN }}}" >> $GITHUB_ENV

      - name: Docker Login
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Generate OOT Dockerfile for forked repo
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          cat <<EOF > Dockerfile.mod
          FROM ${{ env.ATOM_BASE_NIGHTLY_IMAGE }}
          RUN pip install -U lm-eval[api]
          RUN pip show lm-eval || true
          RUN pip install hf_transfer
          RUN pip show hf_transfer || true
          RUN echo "=== Aiter version BEFORE uninstall ===" && pip show amd-aiter || true
          RUN pip uninstall -y amd-aiter
          RUN pip install --upgrade "pybind11>=3.0.1"
          RUN pip show pybind11
          RUN rm -rf /app/aiter-test
          RUN git clone --depth 1 https://github.com/ROCm/aiter.git /app/aiter-test && \\
              cd /app/aiter-test && \\
              git checkout HEAD && \\
              git submodule sync && git submodule update --init --recursive && \\
              MAX_JOBS=64 PREBUILD_KERNELS=0 GPU_ARCHS=gfx950 python3 setup.py develop
          RUN echo "=== Aiter version AFTER installation ===" && pip show amd-aiter || true
          RUN echo "=== ATOM version BEFORE uninstall ===" && pip show atom || true
          RUN pip uninstall -y atom
          RUN rm -rf /app/ATOM
          RUN git clone ${{ env.GITHUB_REPO_URL }} /app/ATOM && \\
              cd /app/ATOM && \\
              git checkout ${{ env.GITHUB_COMMIT_SHA }} && \\
              pip install -e .
          RUN echo "=== ATOM version AFTER installation ===" && pip show atom || true
          EOF

      - name: Build OOT base image for forked repo
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          docker build --pull --network=host \
            --no-cache \
            -t atom_oot_base:ci \
            -f Dockerfile.mod .

      - name: Build OOT vLLM image for forked repo
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          docker build --network=host \
            --no-cache \
            -t atom_oot:ci \
            --target atom_oot \
            --build-arg OOT_BASE_IMAGE="atom_oot_base:ci" \
            --build-arg MAX_JOBS=64 \
            --build-arg VLLM_COMMIT="${VLLM_COMMIT}" \
            --build-arg INSTALL_LM_EVAL=1 \
            --build-arg INSTALL_FASTSAFETENSORS=1 \
            -f docker/Dockerfile .

      - name: Set OOT image tag
        env:
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          if [ "${IS_FORK_PR}" = "true" ]; then
            echo "OOT_IMAGE_TAG=atom_oot:ci" >> "$GITHUB_ENV"
          else
            echo "OOT_IMAGE_TAG=rocm/atom-dev:oot-pre-build-${{ env.GITHUB_COMMIT_SHA }}" >> "$GITHUB_ENV"
          fi

      - name: Run all plugin unit tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "$OOT_IMAGE_TAG" \
            bash -lc "pytest -q tests/plugin -o cache_dir=/tmp/.pytest_cache"

      - name: Prepare model cache mount
        run: |
          model_path="${{ matrix.model_path }}"
          MODEL_CACHE_HOST_ROOT=""
          MODEL_CACHE_MOUNT=""
          MODEL_CACHE_DESC="container-local /models (no host cache mount)"

          if [ -d "/models/${model_path}" ] && [ -f "/models/${model_path}/config.json" ]; then
            MODEL_CACHE_HOST_ROOT="/models"
            MODEL_CACHE_DESC="/models (pre-provisioned host path)"
          elif [ -d "/data/models/${model_path}" ] && [ -f "/data/models/${model_path}/config.json" ]; then
            MODEL_CACHE_HOST_ROOT="/data/models"
            MODEL_CACHE_DESC="/data/models (pre-provisioned host path)"
          elif [ -d "/models" ] && [ -w "/models" ]; then
            MODEL_CACHE_HOST_ROOT="/models"
            MODEL_CACHE_DESC="/models (writable host path)"
          elif [ -d "/data/models" ] && [ -w "/data/models" ]; then
            MODEL_CACHE_HOST_ROOT="/data/models"
            MODEL_CACHE_DESC="/data/models (writable host path)"
          fi

          if [ -n "${MODEL_CACHE_HOST_ROOT}" ]; then
            if mkdir -p "${MODEL_CACHE_HOST_ROOT}/${model_path}"; then
              MODEL_CACHE_MOUNT="-v ${MODEL_CACHE_HOST_ROOT}:/models"
              echo "Model cache host root: ${MODEL_CACHE_HOST_ROOT}"
            else
              MODEL_CACHE_HOST_ROOT=""
              MODEL_CACHE_DESC="container-local /models (no writable host cache mount)"
            fi
          fi

          if [ -z "${MODEL_CACHE_MOUNT}" ]; then
            echo "No writable host model cache found; using container-local /models."
          fi

          echo "Using model cache backend: ${MODEL_CACHE_DESC}"
          echo "MODEL_CACHE_MOUNT=${MODEL_CACHE_MOUNT}" >> "$GITHUB_ENV"
          echo "MODEL_CACHE_DESC=${MODEL_CACHE_DESC}" >> "$GITHUB_ENV"

      - name: Start OOT test container
        run: |
          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          MODEL_MOUNT="${MODEL_CACHE_MOUNT}"
          echo "Using model cache backend: ${MODEL_CACHE_DESC}"

          docker run -dt --device=/dev/kfd $DEVICE_FLAG \
            -v "${GITHUB_WORKSPACE:-$PWD}":/workspace \
            $MODEL_MOUNT \
            -w /workspace \
            --ipc=host --group-add video \
            --shm-size=16G \
            --privileged \
            --cap-add=SYS_PTRACE \
            -e HF_TOKEN="${HF_TOKEN:-}" \
            --security-opt seccomp=unconfined \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            --name "$CONTAINER_NAME" \
            "$OOT_IMAGE_TAG"
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Download model if needed
        if: success()
        run: |
          model_dir="/models/${{ matrix.model_path }}"
          if docker exec "$CONTAINER_NAME" bash -lc "[ -d \"$model_dir\" ] && [ -f \"$model_dir/config.json\" ]"; then
            echo "Model already exists under ${model_dir}; skip download"
          else
            echo "Model not found under ${model_dir}; downloading model"
            if ! docker exec -e HF_TOKEN="${HF_TOKEN:-}" "$CONTAINER_NAME" bash -lc "hf download ${{ matrix.model_path }} --local-dir \"$model_dir\""; then
              echo "Model download failed for '${{ matrix.model_path }}'. Aborting."
              exit 1
            fi
          fi

      - name: Resolve OOT model path
        if: success()
        run: |
          if docker exec "$CONTAINER_NAME" bash -lc "[ -d \"/models/${{ matrix.model_path }}\" ] && [ -f \"/models/${{ matrix.model_path }}/config.json\" ]"; then
            echo "OOT_RESOLVED_MODEL_PATH=/models/${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using pre-downloaded model path: /models/${{ matrix.model_path }}"
          else
            echo "OOT_RESOLVED_MODEL_PATH=${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using model id: ${{ matrix.model_path }}"
          fi

      - name: Run OOT launch and gsm8k accuracy via script (ci mode)
        if: success()
        timeout-minutes: 120
        env:
          OOT_MODEL_NAME: ${{ matrix.model_name }}
          OOT_MODEL_PATH: ${{ matrix.model_path }}
          OOT_EXTRA_ARGS: ${{ matrix.extra_args }}
          OOT_ENV_VARS: ${{ matrix.env_vars }}
          MAX_WAIT_RETRIES: "120"
          STREAM_VLLM_LOGS: "1"
        run: |
          docker exec \
            -e OOT_MODEL_NAME="${OOT_MODEL_NAME}" \
            -e OOT_MODEL_PATH="${OOT_RESOLVED_MODEL_PATH:-$OOT_MODEL_PATH}" \
            -e OOT_EXTRA_ARGS="${OOT_EXTRA_ARGS}" \
            -e OOT_ENV_VARS="${OOT_ENV_VARS}" \
            -e MAX_WAIT_RETRIES="${MAX_WAIT_RETRIES}" \
            -e STREAM_VLLM_LOGS="${STREAM_VLLM_LOGS}" \
            "$CONTAINER_NAME" bash -lc "
              set -euo pipefail
              bash .github/scripts/atom_oot_test.sh accuracy ci
            "

      - name: Check OOT accuracy test results
        if: success()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/oot_accuracy_results ./oot_accuracy_results || true
          result_file=$(ls -1t oot_accuracy_results/*.json 2>/dev/null | head -n 1)
          if [ -z "$result_file" ] || [ ! -f "$result_file" ]; then
            echo "ERROR: No results JSON file found in oot_accuracy_results/"
            exit 2
          fi

          echo "RESULT_FILE: $result_file"
          flexible_extract_value=$(jq '.results.gsm8k["exact_match,flexible-extract"]' "$result_file")
          echo "Flexible extract value: $flexible_extract_value"
          echo "Accuracy test threshold: ${{ matrix.accuracy_test_threshold }}"

          result=$(awk -v val="$flexible_extract_value" -v threshold="${{ matrix.accuracy_test_threshold }}" 'BEGIN {print (val < threshold) ? 1 : 0}')
          if [ "$result" -eq 1 ]; then
            echo "Accuracy test failed: Flexible extract value $flexible_extract_value is less than threshold ${{ matrix.accuracy_test_threshold }}."
            exit 1
          else
            echo "Accuracy test passed: Flexible extract value $flexible_extract_value is greater than or equal to threshold ${{ matrix.accuracy_test_threshold }}."
            exit 0
          fi

      - name: Collect OOT accuracy summary
        if: success()
        run: |
          echo "OOT Accuracy Test Summary for ${{ matrix.model_name }}:" >> $GITHUB_STEP_SUMMARY
          docker exec "$CONTAINER_NAME" bash -lc "awk '/\|Tasks\|Version\|/,/^$/ { if (NF > 0) print }' /tmp/oot_accuracy_output.txt" >> $GITHUB_STEP_SUMMARY || true

      - name: Collect OOT logs and results
        if: always()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/vllm_oot.log ./vllm_oot.log || true
          docker cp "$CONTAINER_NAME":/tmp/oot_accuracy_output.txt ./oot_accuracy_output.txt || true
          docker cp "$CONTAINER_NAME":/tmp/oot_accuracy_results ./oot_accuracy_results || true

      - name: Upload OOT artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oot-${{ matrix.model_name }}-artifacts
          path: |
            vllm_oot.log
            oot_accuracy_output.txt
            oot_accuracy_results

      - name: Clean up OOT test
        if: always()
        run: |
          docker exec "$CONTAINER_NAME" bash -lc "if [ -f /tmp/vllm_oot.pid ]; then kill \$(cat /tmp/vllm_oot.pid) || true; fi" || true
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          KEEP_COUNT="${OOT_IMAGE_CACHE_KEEP:-3}"
          if [[ "${OOT_IMAGE_TAG}" == rocm/atom-dev:oot-pre-build-* ]]; then
            echo "Keeping current OOT image tag and the ${KEEP_COUNT} most recent oot-pre-build tags."
            mapfile -t OLD_OOT_TAGS < <(
              docker image ls --filter=reference='rocm/atom-dev:oot-pre-build-*' --format '{{.Repository}}:{{.Tag}}' \
                | while read -r tag; do
                    [ -n "${tag}" ] || continue
                    created_at=$(docker image inspect --format '{{.Created}}' "${tag}" 2>/dev/null || true)
                    [ -n "${created_at}" ] && printf '%s %s\n' "${created_at}" "${tag}"
                  done \
                | sort -r \
                | awk -v keep="${KEEP_COUNT}" 'NR > keep { print $2 }'
            )
            for tag in "${OLD_OOT_TAGS[@]}"; do
              if [ "${tag}" = "${OOT_IMAGE_TAG}" ]; then
                continue
              fi
              echo "Removing old OOT image tag: ${tag}"
              docker rmi "${tag}" || true
            done
          fi

  # ---------- OOT full validation path (schedule / workflow_dispatch) ----------
  prepare-oot-image:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    name: Prepare OOT validation image
    runs-on: build-only-atom
    outputs:
      oot_image_tag: ${{ steps.meta.outputs.oot_image_tag }}
      cleanup_temp_image: ${{ steps.meta.outputs.cleanup_temp_image }}
      model_matrix: ${{ steps.meta.outputs.model_matrix }}
    steps:
      - name: Checkout selected ATOM branch
        uses: actions/checkout@v6

      - name: Docker Login
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name != 'main' }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Resolve image source and model matrix
        id: meta
        env:
          RUN_QWEN3_MOE_TP8: ${{ inputs.run_qwen3_moe_tp8 }}
          RUN_QWEN3_NEXT_80B_TP4: ${{ inputs.run_qwen3_next_80b_tp4 }}
          RUN_QWEN35_397B_FP8_TP8: ${{ inputs.run_qwen35_397b_fp8_tp8 }}
          RUN_QWEN35_397B_TP8: ${{ inputs.run_qwen35_397b_tp8 }}
          RUN_KIMI_K2_TP8: ${{ inputs.run_kimi_k2_tp8 }}
          RUN_DSR1_FP8_TP8: ${{ inputs.run_dsr1_fp8_tp8 }}
          RUN_DSR1_FP4_TP8: ${{ inputs.run_dsr1_fp4_tp8 }}
          RUN_GPT_OSS_120B_TP1: ${{ inputs.run_gpt_oss_120b_tp1 }}
          RUN_GPT_OSS_120B_TP2: ${{ inputs.run_gpt_oss_120b_tp2 }}
        run: |
          set -euo pipefail

          # Keep this Python model list as the single source of truth for OOT
          # full-validation coverage and manual checkbox filtering.
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys

          event = os.environ["GITHUB_EVENT_NAME"]
          models = [
              {
                  "toggle_env": "RUN_QWEN3_MOE_TP8",
                  "model_name": "Qwen3-235B-A22B-Instruct-2507-FP8 TP8+EP8",
                  "model_path": "Qwen/Qwen3-235B-A22B-Instruct-2507-FP8",
                  "extra_args": "--tensor-parallel-size 8 --enable-expert-parallel",
                  "accuracy_test_threshold": 0.87,
                  "env_vars": "ATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=1",
                  "runner": "linux-atom-mi35x-8",
              },
              {
                  "toggle_env": "RUN_QWEN3_NEXT_80B_TP4",
