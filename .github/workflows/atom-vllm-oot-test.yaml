name: ATOM vLLM OOT Test

on:
  pull_request:
    branches: [main]  # Triggers on PRs targeting `main`
    types: [opened, synchronize, reopened, ready_for_review, closed]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  schedule:
    # Nightly at 02:00 Beijing time (18:00 UTC on the previous day)
    - cron: '0 18 * * *'
  workflow_dispatch:
    # Manual runs use GitHub Actions' built-in branch dropdown ("Use workflow
    # from") as the ATOM branch selector, so users do not need to type branch
    # names.
    inputs:
      run_qwen3_moe_tp8:
        description: "Qwen3-235B-A22B-Instruct-2507-FP8 TP8+EP8"
        required: false
        type: boolean
        default: false
      run_qwen3_next_80b_tp4:
        description: "Qwen3-Next-80B-A3B-Instruct-FP8 TP4"
        required: false
        type: boolean
        default: false
      run_qwen35_397b_fp8_tp8:
        description: "Qwen3.5-397B-A17B-FP8 TP8"
        required: false
        type: boolean
        default: false
      run_qwen35_397b_tp8:
        description: "Qwen3.5-397B-A17B TP8"
        required: false
        type: boolean
        default: false
      run_kimi_k2_tp8:
        description: "Kimi-K2-Thinking-MXFP4 TP8"
        required: false
        type: boolean
        default: false
      run_kimi_k25_tp8:
        description: "Kimi-K2.5-MXFP4 TP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp8_tp8:
        description: "DeepSeek-R1-FP8 TP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp8:
        description: "DeepSeek-R1-0528-MXFP4 TP8"
        required: false
        type: boolean
        default: false
      run_gpt_oss_120b_tp1:
        description: "gpt-oss-120b TP1"
        required: false
        type: boolean
        default: false
      run_gpt_oss_120b_tp2:
        description: "gpt-oss-120b TP2"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  ATOM_BASE_NIGHTLY_IMAGE: rocm/atom-dev:latest
  OOT_IMAGE_CACHE_KEEP: "3"
  GITHUB_REPO_URL: ${{ github.event.pull_request.head.repo.clone_url || 'https://github.com/ROCm/ATOM.git' }}
  GITHUB_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.event.head_commit.id || github.sha }}
  NIGHTLY_OOT_IMAGE_TAG: rocm/atom-dev:vllm-latest
  VALIDATION_IMAGE_REPO: rocm/atom-dev
  GPU_ARCH: "gfx942;gfx950"
  AITER_REPO: "https://github.com/ROCm/aiter.git"
  AITER_COMMIT: "HEAD"
  VLLM_COMMIT: "b31e9326a7d9394aab8c767f8ebe225c65594b60"

jobs:
  # ---------- OOT CI path (pull_request only) ----------
  check-signal:
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false }}
    name: Check Pre Checkin Signal
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Download and check pre-checkin signal
        run: bash ./.github/scripts/check_signal.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

  download_aiter_wheel:
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false }}
    needs: [check-signal]
    name: Download aiter wheel
    runs-on: ubuntu-latest
    outputs:
      aiter_artifact_id: ${{ steps.download.outputs.aiter_artifact_id }}
      aiter_wheel_name: ${{ steps.download.outputs.aiter_wheel_name }}
    steps:
      - name: Find and download latest aiter wheel
        id: download
        run: |
          set -euo pipefail
          echo "=== Finding latest aiter-whl-main artifact from ROCm/aiter ==="

          API_URL="https://api.github.com"
          AUTH_HEADER="Authorization: token ${{ secrets.GITHUB_TOKEN }}"
          AITER_TEST_WORKFLOW_ID=179476100

          RUNS=$(curl -s -H "$AUTH_HEADER" \
            "$API_URL/repos/ROCm/aiter/actions/workflows/$AITER_TEST_WORKFLOW_ID/runs?per_page=100&branch=main&event=push")

          ARTIFACT_ID=""
          ARTIFACT_NAME=""
          for RUN_ID in $(echo "$RUNS" | jq -r '.workflow_runs[].id'); do
            ARTIFACT_JSON=$(curl -s -H "$AUTH_HEADER" \
              "$API_URL/repos/ROCm/aiter/actions/runs/$RUN_ID/artifacts" \
              | jq '[.artifacts[] | select(.name | startswith("aiter-whl-main")) | select(.expired == false)] | first')

            if [ "$ARTIFACT_JSON" != "null" ] && [ -n "$ARTIFACT_JSON" ]; then
              ARTIFACT_ID=$(echo "$ARTIFACT_JSON" | jq -r '.id')
              ARTIFACT_NAME=$(echo "$ARTIFACT_JSON" | jq -r '.name')
              echo "Found artifact in run $RUN_ID: $ARTIFACT_NAME (ID: $ARTIFACT_ID)"
              break
            fi
          done

          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "ERROR: No aiter-whl-main artifact found in recent Aiter Test runs"
            exit 1
          fi

          echo "=== Downloading artifact ==="
          mkdir -p aiter-whl
          curl -s -L -H "$AUTH_HEADER" \
            "$API_URL/repos/ROCm/aiter/actions/artifacts/$ARTIFACT_ID/zip" \
            -o aiter-whl.zip
          unzip -o aiter-whl.zip -d aiter-whl
          rm -f aiter-whl.zip

          AITER_WHL=$(ls -t aiter-whl/amd_aiter*.whl 2>/dev/null | head -1)
          if [ -z "$AITER_WHL" ]; then
            echo "ERROR: No amd_aiter wheel found in artifact"
            ls -la aiter-whl/
            exit 1
          fi

          echo "Downloaded wheel: $AITER_WHL"
          echo "aiter_artifact_id=${ARTIFACT_ID}" >> "$GITHUB_OUTPUT"
          echo "aiter_wheel_name=$(basename "$AITER_WHL")" >> "$GITHUB_OUTPUT"

      - name: Upload aiter wheel
        uses: actions/upload-artifact@v4
        with:
          name: aiter-whl
          path: aiter-whl/amd_aiter*.whl
          retention-days: 1

  build_oot_image:
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false }}
    needs: [check-signal, download_aiter_wheel]
    name: Reuse OOT CI image
    runs-on: build-only-atom
    env:
      VLLM_COMMIT: b31e9326a7d9394aab8c767f8ebe225c65594b60
      AITER_ARTIFACT_ID: ${{ needs.download_aiter_wheel.outputs.aiter_artifact_id }}
    steps:
      - name: Initialize OOT image tag
        run: |
          echo "OOT_IMAGE_TAG=rocm/atom-dev:oot-pre-build-${GITHUB_COMMIT_SHA}" >> "$GITHUB_ENV"

      - name: Checkout ATOM repo
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        uses: actions/checkout@v6

      - name: Docker Login
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Check existing prebuilt OOT image
        id: existing_oot_image
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          set -euo pipefail
          echo "image_exists=false" >> "$GITHUB_OUTPUT"

          if ! docker manifest inspect "${OOT_IMAGE_TAG}" >/dev/null 2>&1; then
            echo "No existing OOT image found for ${OOT_IMAGE_TAG}; building a new one."
            exit 0
          fi

          echo "Found existing OOT image for ${OOT_IMAGE_TAG}; validating vLLM commit label."
          if ! docker pull "${OOT_IMAGE_TAG}"; then
            echo "Failed to pull existing image ${OOT_IMAGE_TAG}; rebuilding it."
            exit 0
          fi

          EXISTING_VLLM_COMMIT="$(docker inspect --format '{{ index .Config.Labels "com.rocm.atom.vllm_commit" }}' "${OOT_IMAGE_TAG}" 2>/dev/null || true)"
          EXISTING_AITER_ARTIFACT_ID="$(docker inspect --format '{{ index .Config.Labels "com.rocm.atom.aiter_artifact_id" }}' "${OOT_IMAGE_TAG}" 2>/dev/null || true)"
          if [ -n "${EXISTING_VLLM_COMMIT}" ] && [ "${EXISTING_VLLM_COMMIT}" = "${VLLM_COMMIT}" ] && [ -n "${EXISTING_AITER_ARTIFACT_ID}" ] && [ "${EXISTING_AITER_ARTIFACT_ID}" = "${AITER_ARTIFACT_ID}" ]; then
            echo "image_exists=true" >> "$GITHUB_OUTPUT"
            echo "Reusing existing OOT image for ${OOT_IMAGE_TAG} (vLLM commit ${EXISTING_VLLM_COMMIT}, aiter artifact ${EXISTING_AITER_ARTIFACT_ID})."
          else
            echo "Existing image label mismatch or missing."
            echo "Expected vLLM commit ${VLLM_COMMIT}, got ${EXISTING_VLLM_COMMIT:-<missing>}."
            echo "Expected aiter artifact ${AITER_ARTIFACT_ID}, got ${EXISTING_AITER_ARTIFACT_ID:-<missing>}."
          fi

      - name: Download aiter wheel
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_oot_image.outputs.image_exists != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: aiter-whl
          path: aiter-whl

      - name: Generate OOT overlay Dockerfile
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_oot_image.outputs.image_exists != 'true' }}
        run: |
          cat <<'EOF' > Dockerfile.mod
          ARG OOT_BASE_IMAGE
          FROM ${OOT_BASE_IMAGE}
          ARG GITHUB_REPO_URL
          ARG GITHUB_COMMIT_SHA
          ARG VLLM_COMMIT
          ARG AITER_ARTIFACT_ID
          ARG INSTALL_LM_EVAL=1
          LABEL com.rocm.atom.vllm_commit="${VLLM_COMMIT}"
          LABEL com.rocm.atom.aiter_artifact_id="${AITER_ARTIFACT_ID}"
          COPY aiter-whl/ /tmp/aiter-whl/
          RUN if [ "${INSTALL_LM_EVAL}" = "1" ]; then pip install -U "lm-eval[api]"; else echo "Skip lm-eval install"; fi
          RUN pip show lm-eval || true
          RUN pip install hf_transfer
          RUN pip show hf_transfer || true
          RUN pip install --upgrade "pybind11>=3.0.1"
          RUN pip show pybind11
          RUN echo "=== Aiter version BEFORE uninstall ===" && pip show amd-aiter || true && \
              pip uninstall -y amd-aiter || true && \
              rm -rf /app/aiter-test && \
              AITER_WHL="$(ls -t /tmp/aiter-whl/amd_aiter*.whl 2>/dev/null | head -1)" && \
              if [ -z "${AITER_WHL}" ]; then echo "ERROR: No amd_aiter wheel found under /tmp/aiter-whl"; ls -la /tmp/aiter-whl || true; exit 1; fi && \
              pip install "${AITER_WHL}" && \
              echo "=== Aiter version AFTER installation ===" && pip show amd-aiter || true && \
              rm -rf /tmp/aiter-whl
          RUN echo "=== ATOM version BEFORE uninstall ===" && pip show atom || true && \
              pip uninstall -y atom || true && \
              rm -rf /app/ATOM && \
              git clone "${GITHUB_REPO_URL}" /app/ATOM && \
              cd /app/ATOM && \
              git checkout "${GITHUB_COMMIT_SHA}" && \
              pip install -e . --no-deps && \
              echo "=== ATOM version AFTER installation ===" && pip show atom || true
          RUN pip show amd-aiter atom vllm torch triton mori || true
          EOF

      - name: Resolve OOT CI build mode
        id: build_mode
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_oot_image.outputs.image_exists != 'true' }}
        run: |
          set -euo pipefail
          echo "build_mode=full" >> "$GITHUB_OUTPUT"

          if ! docker pull "${NIGHTLY_OOT_IMAGE_TAG}"; then
            echo "Unable to pull ${NIGHTLY_OOT_IMAGE_TAG}; falling back to a full vLLM rebuild."
            exit 0
          fi

          echo "Inspecting ${NIGHTLY_OOT_IMAGE_TAG} labels before deciding whether to reuse it."
          docker inspect --format 'Image ID: {{.Id}}' "${NIGHTLY_OOT_IMAGE_TAG}" || true
          docker inspect --format 'Image labels: {{json .Config.Labels}}' "${NIGHTLY_OOT_IMAGE_TAG}" || true
          LATEST_VLLM_COMMIT="$(docker inspect --format '{{ index .Config.Labels "com.rocm.atom.vllm_commit" }}' "${NIGHTLY_OOT_IMAGE_TAG}" 2>/dev/null || true)"
          echo "Expected vLLM commit label: ${VLLM_COMMIT}"
          echo "Resolved ${NIGHTLY_OOT_IMAGE_TAG} label com.rocm.atom.vllm_commit: ${LATEST_VLLM_COMMIT:-<missing>}"
          if [ -n "${LATEST_VLLM_COMMIT}" ] && [ "${LATEST_VLLM_COMMIT}" = "${VLLM_COMMIT}" ]; then
            echo "build_mode=fast" >> "$GITHUB_OUTPUT"
            echo "Reusing ${NIGHTLY_OOT_IMAGE_TAG} as the OOT CI base (vLLM commit ${LATEST_VLLM_COMMIT})."
          else
            echo "OOT CI latest image label mismatch or missing. Expected ${VLLM_COMMIT}, got ${LATEST_VLLM_COMMIT:-<missing>}; rebuilding vLLM."
          fi

      - name: Build OOT overlay image from reusable latest
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_oot_image.outputs.image_exists != 'true' && steps.build_mode.outputs.build_mode == 'fast' }}
        run: |
          DOCKER_BUILDKIT=1 docker build --network=host \
            -t atom_oot:ci \
            --build-arg OOT_BASE_IMAGE="${NIGHTLY_OOT_IMAGE_TAG}" \
            --build-arg GITHUB_REPO_URL="${GITHUB_REPO_URL}" \
            --build-arg GITHUB_COMMIT_SHA="${GITHUB_COMMIT_SHA}" \
            --build-arg VLLM_COMMIT="${VLLM_COMMIT}" \
            --build-arg AITER_ARTIFACT_ID="${AITER_ARTIFACT_ID}" \
            --build-arg INSTALL_LM_EVAL=1 \
            -f Dockerfile.mod .

      - name: Build OOT overlay base image
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_oot_image.outputs.image_exists != 'true' && steps.build_mode.outputs.build_mode != 'fast' }}
        run: |
          DOCKER_BUILDKIT=1 docker build --pull --network=host \
            --no-cache \
            -t atom_oot_base:ci \
            --build-arg OOT_BASE_IMAGE="${ATOM_BASE_NIGHTLY_IMAGE}" \
            --build-arg GITHUB_REPO_URL="${GITHUB_REPO_URL}" \
            --build-arg GITHUB_COMMIT_SHA="${GITHUB_COMMIT_SHA}" \
            --build-arg VLLM_COMMIT="${VLLM_COMMIT}" \
            --build-arg AITER_ARTIFACT_ID="${AITER_ARTIFACT_ID}" \
            --build-arg INSTALL_LM_EVAL=1 \
            -f Dockerfile.mod .

      - name: Build OOT vLLM image
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_oot_image.outputs.image_exists != 'true' && steps.build_mode.outputs.build_mode != 'fast' }}
        run: |
          DOCKER_BUILDKIT=1 docker build --network=host \
            --no-cache \
            -t atom_oot:ci \
            --target atom_oot \
            --build-arg OOT_BASE_IMAGE="atom_oot_base:ci" \
            --build-arg MAX_JOBS=64 \
            --build-arg VLLM_COMMIT="${VLLM_COMMIT}" \
            --build-arg INSTALL_LM_EVAL=1 \
            --build-arg INSTALL_FASTSAFETENSORS=1 \
            -f docker/Dockerfile .

      - name: Push Docker image
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_oot_image.outputs.image_exists != 'true' }}
        run: |
          docker tag atom_oot:ci "${OOT_IMAGE_TAG}"
          docker push "${OOT_IMAGE_TAG}"

      - name: Skip remote build for fork PR
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          echo "Fork PRs build the OOT image locally on each test runner."

      - name: Clean up build images
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && always() }}
        run: |
          rm -f Dockerfile.mod || true
          docker rmi "atom_oot_base:ci" || true
          docker rmi "atom_oot:ci" || true
          docker rmi "${OOT_IMAGE_TAG}" || true

  atom-vllm-oot:
    needs: [check-signal, download_aiter_wheel, build_oot_image]
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false }}
    name: ATOM vLLM OOT Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_name: "DeepSeek-R1-FP8"
            model_path: "deepseek-ai/DeepSeek-R1-0528"
            extra_args: "--tensor-parallel-size 8"
            env_vars: ""
            accuracy_test_threshold: 0.93
            runner: atom-mi355-8gpu.predownload
          - model_name: "gpt-oss-120b"
            model_path: "openai/gpt-oss-120b"
            extra_args: "--tensor-parallel-size 1"
            env_vars: "ATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=1"
            accuracy_test_threshold: 0.38
            runner: linux-atom-mi35x-1
          - model_name: "Kimi-K2-Thinking-MXFP4"
            model_path: "amd/Kimi-K2-Thinking-MXFP4"
            extra_args: "--tensor-parallel-size 4"
            env_vars: ""
            accuracy_test_threshold: 0.90
            runner: linux-atom-mi35x-4
          - model_name: "Qwen3.5-35B-A3B-FP8"
            model_path: "Qwen/Qwen3.5-35B-A3B-FP8"
            extra_args: "--tensor-parallel-size 2"
            # FIXME: Remove these temporary Qwen3.5 workarounds after the
            # aiter fix landed
            env_vars: |
              ATOM_DISABLE_VLLM_PLUGIN_ATTENTION=1
              ATOM_USE_CUSTOM_ALL_GATHER=0
            accuracy_test_threshold: 0.76
            runner: linux-atom-mi35x-4
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    env:
      CONTAINER_NAME: atom_vllm_oot_${{ strategy.job-index }}
      VLLM_COMMIT: b31e9326a7d9394aab8c767f8ebe225c65594b60
      VLLM_VERSION: "0.17"
      AITER_ARTIFACT_ID: ${{ needs.download_aiter_wheel.outputs.aiter_artifact_id }}

    steps:
      - name: Clean up containers and workspace
        if: matrix.runner == 'atom-mi355-8gpu.predownload'
        run: |
          echo "=== Cleaning up containers on $(hostname) ==="
          containers=$(docker ps -q)
          if [ -n "$containers" ]; then
            docker kill $containers || true
          fi
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          docker run --rm -v "${GITHUB_WORKSPACE:-$PWD}":/workspace -w /workspace --privileged rocm/pytorch:latest bash -lc "ls -la /workspace/ && find /workspace -mindepth 1 -delete" || true

      - name: Checkout ATOM repo
        uses: actions/checkout@v4

      - name: Set HF_TOKEN
        run: echo "HF_TOKEN=${HF_TOKEN:-${{ secrets.AMD_HF_TOKEN }}}" >> $GITHUB_ENV

      - name: Docker Login
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Download aiter wheel
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        uses: actions/download-artifact@v4
        with:
          name: aiter-whl
          path: aiter-whl

      - name: Generate OOT overlay Dockerfile for forked repo
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          cat <<'EOF' > Dockerfile.mod
          ARG OOT_BASE_IMAGE
          FROM ${OOT_BASE_IMAGE}
          ARG GITHUB_REPO_URL
          ARG GITHUB_COMMIT_SHA
          ARG VLLM_COMMIT
          ARG AITER_ARTIFACT_ID
          ARG INSTALL_LM_EVAL=1
          LABEL com.rocm.atom.vllm_commit="${VLLM_COMMIT}"
          LABEL com.rocm.atom.aiter_artifact_id="${AITER_ARTIFACT_ID}"
          COPY aiter-whl/ /tmp/aiter-whl/
          RUN if [ "${INSTALL_LM_EVAL}" = "1" ]; then pip install -U "lm-eval[api]"; else echo "Skip lm-eval install"; fi
          RUN pip show lm-eval || true
          RUN pip install hf_transfer
          RUN pip show hf_transfer || true
          RUN pip install --upgrade "pybind11>=3.0.1"
          RUN pip show pybind11
          RUN echo "=== Aiter version BEFORE uninstall ===" && pip show amd-aiter || true && \
              pip uninstall -y amd-aiter || true && \
              rm -rf /app/aiter-test && \
              AITER_WHL="$(ls -t /tmp/aiter-whl/amd_aiter*.whl 2>/dev/null | head -1)" && \
              if [ -z "${AITER_WHL}" ]; then echo "ERROR: No amd_aiter wheel found under /tmp/aiter-whl"; ls -la /tmp/aiter-whl || true; exit 1; fi && \
              pip install "${AITER_WHL}" && \
              echo "=== Aiter version AFTER installation ===" && pip show amd-aiter || true && \
              rm -rf /tmp/aiter-whl
          RUN echo "=== ATOM version BEFORE uninstall ===" && pip show atom || true && \
              pip uninstall -y atom || true && \
              rm -rf /app/ATOM && \
              git clone "${GITHUB_REPO_URL}" /app/ATOM && \
              cd /app/ATOM && \
              git checkout "${GITHUB_COMMIT_SHA}" && \
              pip install -e . --no-deps && \
              echo "=== ATOM version AFTER installation ===" && pip show atom || true
          RUN pip show amd-aiter atom vllm torch triton mori || true
          EOF

      - name: Build OOT image for forked repo
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          set -euo pipefail
          docker rmi "atom_oot_base:ci" || true
          docker rmi "atom_oot:ci" || true

          BUILD_MODE="full"
          if ! docker pull "${NIGHTLY_OOT_IMAGE_TAG}"; then
            echo "Unable to pull ${NIGHTLY_OOT_IMAGE_TAG}; rebuilding vLLM locally."
          else
            echo "Inspecting ${NIGHTLY_OOT_IMAGE_TAG} labels before deciding whether to reuse it locally."
            docker inspect --format 'Image ID: {{.Id}}' "${NIGHTLY_OOT_IMAGE_TAG}" || true
            docker inspect --format 'Image labels: {{json .Config.Labels}}' "${NIGHTLY_OOT_IMAGE_TAG}" || true
            LATEST_VLLM_COMMIT="$(docker inspect --format '{{ index .Config.Labels "com.rocm.atom.vllm_commit" }}' "${NIGHTLY_OOT_IMAGE_TAG}" 2>/dev/null || true)"
            echo "Expected vLLM commit label: ${VLLM_COMMIT}"
            echo "Resolved ${NIGHTLY_OOT_IMAGE_TAG} label com.rocm.atom.vllm_commit: ${LATEST_VLLM_COMMIT:-<missing>}"
            if [ -n "${LATEST_VLLM_COMMIT}" ] && [ "${LATEST_VLLM_COMMIT}" = "${VLLM_COMMIT}" ]; then
              BUILD_MODE="fast"
              echo "Reusing ${NIGHTLY_OOT_IMAGE_TAG} locally for fork PR OOT CI."
            else
              echo "OOT CI latest image label mismatch or missing. Expected ${VLLM_COMMIT}, got ${LATEST_VLLM_COMMIT:-<missing>}; rebuilding vLLM locally."
            fi
          fi

          if [ "${BUILD_MODE}" = "fast" ]; then
            DOCKER_BUILDKIT=1 docker build --network=host \
              -t atom_oot:ci \
              --build-arg OOT_BASE_IMAGE="${NIGHTLY_OOT_IMAGE_TAG}" \
              --build-arg GITHUB_REPO_URL="${GITHUB_REPO_URL}" \
              --build-arg GITHUB_COMMIT_SHA="${GITHUB_COMMIT_SHA}" \
              --build-arg VLLM_COMMIT="${VLLM_COMMIT}" \
              --build-arg AITER_ARTIFACT_ID="${AITER_ARTIFACT_ID}" \
              --build-arg INSTALL_LM_EVAL=1 \
              -f Dockerfile.mod .
            exit 0
          fi

          DOCKER_BUILDKIT=1 docker build --pull --network=host \
            --no-cache \
            -t atom_oot_base:ci \
            --build-arg OOT_BASE_IMAGE="${ATOM_BASE_NIGHTLY_IMAGE}" \
            --build-arg GITHUB_REPO_URL="${GITHUB_REPO_URL}" \
            --build-arg GITHUB_COMMIT_SHA="${GITHUB_COMMIT_SHA}" \
            --build-arg VLLM_COMMIT="${VLLM_COMMIT}" \
            --build-arg AITER_ARTIFACT_ID="${AITER_ARTIFACT_ID}" \
            --build-arg INSTALL_LM_EVAL=1 \
            -f Dockerfile.mod .

          DOCKER_BUILDKIT=1 docker build --network=host \
            --no-cache \
            -t atom_oot:ci \
            --target atom_oot \
            --build-arg OOT_BASE_IMAGE="atom_oot_base:ci" \
            --build-arg MAX_JOBS=64 \
            --build-arg VLLM_COMMIT="${VLLM_COMMIT}" \
            --build-arg INSTALL_LM_EVAL=1 \
            --build-arg INSTALL_FASTSAFETENSORS=1 \
            -f docker/Dockerfile .

      - name: Set OOT image tag
        env:
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          if [ "${IS_FORK_PR}" = "true" ]; then
            echo "OOT_IMAGE_TAG=atom_oot:ci" >> "$GITHUB_ENV"
          else
            echo "OOT_IMAGE_TAG=rocm/atom-dev:oot-pre-build-${GITHUB_COMMIT_SHA}" >> "$GITHUB_ENV"
          fi

      - name: Pull OOT image
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          docker pull "${OOT_IMAGE_TAG}"

      - name: Prepare model cache mount
        run: |
          MODEL_CACHE_MOUNT=""
          MODEL_CACHE_DESC="container-local /models (no host cache mount)"

          if [ -d "/models" ]; then
            MODEL_CACHE_MOUNT="-v /models:/models"
            MODEL_CACHE_DESC="/models (host mount)"
          else
            echo "Warning: /models directory not found on runner; using container-local /models."
          fi

          echo "Using model cache backend: ${MODEL_CACHE_DESC}"
          echo "MODEL_CACHE_MOUNT=${MODEL_CACHE_MOUNT}" >> "$GITHUB_ENV"
          echo "MODEL_CACHE_DESC=${MODEL_CACHE_DESC}" >> "$GITHUB_ENV"

      - name: Start OOT test container
        run: |
          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          MODEL_MOUNT="${MODEL_CACHE_MOUNT}"
          echo "Using model cache backend: ${MODEL_CACHE_DESC}"

          docker run -dt --device=/dev/kfd $DEVICE_FLAG \
            -v "${GITHUB_WORKSPACE:-$PWD}":/workspace \
            $MODEL_MOUNT \
            -w /workspace \
            --ipc=host --group-add video \
            --shm-size=16G \
            --privileged \
            --cap-add=SYS_PTRACE \
            -e HF_TOKEN="${HF_TOKEN:-}" \
            --security-opt seccomp=unconfined \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            --name "$CONTAINER_NAME" \
            "$OOT_IMAGE_TAG"
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Download model if needed
        if: success()
        run: |
          set -euo pipefail
          model_dir="/models/${{ matrix.model_path }}"
          if [ -n "${MODEL_CACHE_MOUNT}" ]; then
            lock_suffix="$(printf '%s' "${{ matrix.model_path }}" | tr '/:@' '___')"
            if ! docker exec \
              -e HF_TOKEN="${HF_TOKEN:-}" \
              -e MODEL_PATH="${{ matrix.model_path }}" \
              -e MODEL_DIR="$model_dir" \
              -e RUNNER_NAME="${{ matrix.runner }}" \
              -e LOCK_SUFFIX="$lock_suffix" \
              "$CONTAINER_NAME" \
              bash -lc '
                set -euo pipefail
                completion_flag="$MODEL_DIR/.download-complete"
                use_model_lock="true"

                if [ "$RUNNER_NAME" = "atom-mi355-8gpu.predownload" ]; then
                  use_model_lock="false"
                fi

                download_model() {
                  if [ -f "$MODEL_DIR/config.json" ]; then
                    echo "Model directory exists without a completion marker under ${MODEL_DIR}; validating download"
                  else
                    echo "Model not found under ${MODEL_DIR}; downloading model"
                  fi

                  rm -f "$completion_flag"
                  hf download "$MODEL_PATH" --local-dir "$MODEL_DIR"
                  touch "$completion_flag"
                }

                if [ -f "$completion_flag" ]; then
                  echo "Model already exists under ${MODEL_DIR}; skip download"
                elif [ "$use_model_lock" != "true" ]; then
                  echo "Baremetal runner ${RUNNER_NAME} detected; skipping shared model download lock"
                  download_model
                else
                  lock_dir="/models/.cache/atom-download-locks"
                  mkdir -p "$lock_dir"
                  lock_file="$lock_dir/${LOCK_SUFFIX}.lock"
                  exec 9>"$lock_file"
                  echo "Waiting for model download lock: $lock_file"
                  if ! flock -w 7200 9; then
                    echo "Timed out waiting for model download lock: $lock_file"
                    exit 1
                  fi

                  if [ -f "$completion_flag" ]; then
                    echo "Model became available under ${MODEL_DIR} while waiting for the lock; skip download"
                  else
                    download_model
                  fi
                fi
              '; then
              echo "Model download failed for '${{ matrix.model_path }}'. Aborting."
              exit 1
            fi
          else
            echo "/models directory not mounted; skipping model download"
          fi

      - name: Resolve OOT model path
        if: success()
        run: |
          if [ -n "${MODEL_CACHE_MOUNT}" ]; then
            echo "OOT_RESOLVED_MODEL_PATH=/models/${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using mounted model path: /models/${{ matrix.model_path }}"
          else
            echo "OOT_RESOLVED_MODEL_PATH=${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using model id: ${{ matrix.model_path }}"
          fi

      - name: Run OOT launch and gsm8k accuracy via script (ci mode)
        if: success()
        timeout-minutes: 120
        env:
          OOT_MODEL_NAME: ${{ matrix.model_name }}
          OOT_MODEL_PATH: ${{ matrix.model_path }}
          OOT_EXTRA_ARGS: ${{ matrix.extra_args }}
          OOT_ENV_VARS: ${{ matrix.env_vars }}
          MAX_WAIT_RETRIES: "120"
          STREAM_VLLM_LOGS: "1"
        run: |
          docker exec \
            -e OOT_MODEL_NAME="${OOT_MODEL_NAME}" \
            -e OOT_MODEL_PATH="${OOT_RESOLVED_MODEL_PATH:-$OOT_MODEL_PATH}" \
            -e OOT_EXTRA_ARGS="${OOT_EXTRA_ARGS}" \
            -e OOT_ENV_VARS="${OOT_ENV_VARS}" \
            -e MAX_WAIT_RETRIES="${MAX_WAIT_RETRIES}" \
            -e STREAM_VLLM_LOGS="${STREAM_VLLM_LOGS}" \
            "$CONTAINER_NAME" bash -lc "
              set -euo pipefail
              bash .github/scripts/atom_oot_test.sh accuracy ci
            "

      - name: Check OOT accuracy test results
        if: success()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/oot_accuracy_results ./oot_accuracy_results || true
          result_file=$(ls -1t oot_accuracy_results/*.json 2>/dev/null | head -n 1)
          if [ -z "$result_file" ] || [ ! -f "$result_file" ]; then
            echo "ERROR: No results JSON file found in oot_accuracy_results/"
            exit 2
          fi

          echo "RESULT_FILE: $result_file"
          flexible_extract_value=$(jq '.results.gsm8k["exact_match,flexible-extract"]' "$result_file")
          echo "Flexible extract value: $flexible_extract_value"
          echo "Accuracy test threshold: ${{ matrix.accuracy_test_threshold }}"

          result=$(awk -v val="$flexible_extract_value" -v threshold="${{ matrix.accuracy_test_threshold }}" 'BEGIN {print (val < threshold) ? 1 : 0}')
          if [ "$result" -eq 1 ]; then
            echo "Accuracy test failed: Flexible extract value $flexible_extract_value is less than threshold ${{ matrix.accuracy_test_threshold }}."
            exit 1
          else
            echo "Accuracy test passed: Flexible extract value $flexible_extract_value is greater than or equal to threshold ${{ matrix.accuracy_test_threshold }}."
            exit 0
          fi

      - name: Collect OOT accuracy summary
        if: success()
        run: |
          echo "OOT Accuracy Test Summary for ${{ matrix.model_name }}:" >> $GITHUB_STEP_SUMMARY
          docker exec "$CONTAINER_NAME" bash -lc "awk '/\|Tasks\|Version\|/,/^$/ { if (NF > 0) print }' /tmp/oot_accuracy_output.txt" >> $GITHUB_STEP_SUMMARY || true

      - name: Collect OOT logs and results
        if: always()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/vllm_oot.log ./vllm_oot.log || true
          docker cp "$CONTAINER_NAME":/tmp/oot_accuracy_output.txt ./oot_accuracy_output.txt || true
          docker cp "$CONTAINER_NAME":/tmp/oot_accuracy_results ./oot_accuracy_results || true

      - name: Upload OOT artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oot-${{ matrix.model_name }}-artifacts
          path: |
            vllm_oot.log
            oot_accuracy_output.txt
            oot_accuracy_results

      - name: Clean up OOT test
        if: always()
        run: |
          docker exec "$CONTAINER_NAME" bash -lc "if [ -f /tmp/vllm_oot.pid ]; then kill \$(cat /tmp/vllm_oot.pid) || true; fi" || true
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          rm -f Dockerfile.mod || true
          docker rmi "atom_oot_base:ci" || true
          docker rmi "atom_oot:ci" || true
          KEEP_COUNT="${OOT_IMAGE_CACHE_KEEP:-3}"
          if [[ "${OOT_IMAGE_TAG}" == rocm/atom-dev:oot-pre-build-* ]]; then
            echo "Keeping current OOT image tag and the ${KEEP_COUNT} most recent oot-pre-build tags."
            mapfile -t OLD_OOT_TAGS < <(
              docker image ls --filter=reference='rocm/atom-dev:oot-pre-build-*' --format '{{.Repository}}:{{.Tag}}' \
                | while read -r tag; do
                    [ -n "${tag}" ] || continue
                    created_at=$(docker image inspect --format '{{.Created}}' "${tag}" 2>/dev/null || true)
                    [ -n "${created_at}" ] && printf '%s %s\n' "${created_at}" "${tag}"
                  done \
                | sort -r \
                | awk -v keep="${KEEP_COUNT}" 'NR > keep { print $2 }'
            )
            for tag in "${OLD_OOT_TAGS[@]}"; do
              if [ "${tag}" = "${OOT_IMAGE_TAG}" ]; then
                continue
              fi
              echo "Removing old OOT image tag: ${tag}"
              docker rmi "${tag}" || true
            done
          fi

  # ---------- OOT full validation path (schedule / workflow_dispatch) ----------
  prepare-oot-image:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    name: Prepare OOT validation image
    runs-on: build-only-atom
    outputs:
      oot_image_tag: ${{ steps.meta.outputs.oot_image_tag }}
      cleanup_temp_image: ${{ steps.meta.outputs.cleanup_temp_image }}
      model_matrix: ${{ steps.meta.outputs.model_matrix }}
    steps:
      - name: Checkout selected ATOM branch
        uses: actions/checkout@v6

      - name: Docker Login
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name != 'main' }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Resolve image source and model matrix
        id: meta
        env:
          RUN_QWEN3_MOE_TP8: ${{ inputs.run_qwen3_moe_tp8 }}
          RUN_QWEN3_NEXT_80B_TP4: ${{ inputs.run_qwen3_next_80b_tp4 }}
          RUN_QWEN35_397B_FP8_TP8: ${{ inputs.run_qwen35_397b_fp8_tp8 }}
          RUN_QWEN35_397B_TP8: ${{ inputs.run_qwen35_397b_tp8 }}
          RUN_KIMI_K2_TP8: ${{ inputs.run_kimi_k2_tp8 }}
          RUN_KIMI_K25_TP8: ${{ inputs.run_kimi_k25_tp8 }}
          RUN_DSR1_FP8_TP8: ${{ inputs.run_dsr1_fp8_tp8 }}
          RUN_DSR1_FP4_TP8: ${{ inputs.run_dsr1_fp4_tp8 }}
          RUN_GPT_OSS_120B_TP1: ${{ inputs.run_gpt_oss_120b_tp1 }}
          RUN_GPT_OSS_120B_TP2: ${{ inputs.run_gpt_oss_120b_tp2 }}
        run: |
          set -euo pipefail

          # Keep this Python model list as the single source of truth for OOT
          # full-validation coverage and manual checkbox filtering.
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys

          event = os.environ["GITHUB_EVENT_NAME"]
          models = [
              {
                  "toggle_env": "RUN_QWEN3_MOE_TP8",
                  "model_name": "Qwen3-235B-A22B-Instruct-2507-FP8 TP8+EP8",
                  "model_path": "Qwen/Qwen3-235B-A22B-Instruct-2507-FP8",
                  "extra_args": "--tensor-parallel-size 8 --enable-expert-parallel",
                  "accuracy_test_threshold": 0.87,
                  "env_vars": "ATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=1",
                  "runner": "linux-atom-mi35x-8",
              },
              {
                  "toggle_env": "RUN_QWEN3_NEXT_80B_TP4",
                  "model_name": "Qwen3-Next-80B-A3B-Instruct-FP8 TP4",
                  "model_path": "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8",
                  "extra_args": "--tensor-parallel-size 4",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "ATOM_DISABLE_VLLM_PLUGIN_ATTENTION=1\nATOM_USE_CUSTOM_ALL_GATHER=0",
                  "runner": "linux-atom-mi35x-4",
              },
              {
                  "toggle_env": "RUN_QWEN35_397B_FP8_TP8",
                  "model_name": "Qwen3.5-397B-A17B-FP8 TP8",
                  "model_path": "Qwen/Qwen3.5-397B-A17B-FP8",
                  "extra_args": "--tensor-parallel-size 8",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "ATOM_DISABLE_VLLM_PLUGIN_ATTENTION=1\nATOM_USE_CUSTOM_ALL_GATHER=0",
                  "runner": "linux-atom-mi35x-8",
              },
              {
                  "toggle_env": "RUN_QWEN35_397B_TP8",
                  "model_name": "Qwen3.5-397B-A17B TP8",
                  "model_path": "Qwen/Qwen3.5-397B-A17B",
                  "extra_args": "--tensor-parallel-size 8",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "ATOM_DISABLE_VLLM_PLUGIN_ATTENTION=1\nATOM_USE_CUSTOM_ALL_GATHER=0",
                  "runner": "linux-atom-mi35x-8",
              },
              {
                  "toggle_env": "RUN_KIMI_K2_TP8",
                  "model_name": "Kimi-K2-Thinking-MXFP4 TP8",
                  "model_path": "amd/Kimi-K2-Thinking-MXFP4",
                  "extra_args": "--tensor-parallel-size 8",
                  "accuracy_test_threshold": 0.90,
                  "env_vars": "",
                  "runner": "linux-atom-mi35x-8",
              },
              {
                  "toggle_env": "RUN_KIMI_K25_TP8",
                  "model_name": "Kimi-K2.5-MXFP4 TP8",
                  "model_path": "amd/Kimi-K2.5-MXFP4",
                  "extra_args": "--tensor-parallel-size 8",
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "",
                  "runner": "linux-atom-mi35x-8",
              },
              {
                  "toggle_env": "RUN_DSR1_FP8_TP8",
                  "model_name": "DeepSeek-R1-FP8 TP8",
                  "model_path": "deepseek-ai/DeepSeek-R1-0528",
                  "extra_args": "--tensor-parallel-size 8",
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "",
                  "runner": "linux-atom-mi35x-8",
              },
              {
                  "toggle_env": "RUN_DSR1_FP4_TP8",
                  "model_name": "DeepSeek-R1-0528-MXFP4 TP8",
                  "model_path": "amd/DeepSeek-R1-0528-MXFP4",
                  "extra_args": "--tensor-parallel-size 8",
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "",
                  "runner": "linux-atom-mi35x-8",
              },
              {
                  "toggle_env": "RUN_GPT_OSS_120B_TP1",
                  "model_name": "gpt-oss-120b TP1",
                  "model_path": "openai/gpt-oss-120b",
                  "extra_args": "--tensor-parallel-size 1",
                  "accuracy_test_threshold": 0.38,
                  "env_vars": "ATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=1",
                  "runner": "linux-atom-mi35x-1",
              },
              {
                  "toggle_env": "RUN_GPT_OSS_120B_TP2",
                  "model_name": "gpt-oss-120b TP2",
                  "model_path": "openai/gpt-oss-120b",
                  "extra_args": "--tensor-parallel-size 2",
                  "accuracy_test_threshold": 0.38,
                  "env_vars": "ATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=1",
                  "runner": "linux-atom-mi35x-4",
              },
          ]

          selected = []
          for model in models:
              enabled = event != "workflow_dispatch" or os.environ.get(model["toggle_env"], "").lower() == "true"
              if enabled:
                  selected.append({k: v for k, v in model.items() if k != "toggle_env"})

          if event == "workflow_dispatch" and not selected:
              print("No models selected for manual run.", file=sys.stderr)
              sys.exit(1)

          print(f"model_matrix={json.dumps({'include': selected})}")
          PY

          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ] || [ "${GITHUB_REF_NAME}" = "main" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "Manual run on main reuses published OOT image: ${NIGHTLY_OOT_IMAGE_TAG}"
            else
              echo "Scheduled run uses published OOT image: ${NIGHTLY_OOT_IMAGE_TAG}"
            fi
            echo "oot_image_tag=${NIGHTLY_OOT_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
            echo "cleanup_temp_image=false" >> "$GITHUB_OUTPUT"
            echo "manual_base_image_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          MANUAL_BASE_IMAGE_TAG="atom_oot_manual_base:${GITHUB_RUN_ID}-${SHORT_SHA}"
          OOT_IMAGE_TAG="${VALIDATION_IMAGE_REPO}:oot-full-manual-${GITHUB_RUN_ID}-${SHORT_SHA}"
          BUILD_CONTEXT="$(mktemp -d)"
          trap 'rm -rf "${BUILD_CONTEXT}"' EXIT

          git archive --format=tar HEAD | tar -xf - -C "${BUILD_CONTEXT}"

          cat <<'EOF' > "${BUILD_CONTEXT}/Dockerfile.mod"
          ARG ATOM_BASE_NIGHTLY_IMAGE
          FROM ${ATOM_BASE_NIGHTLY_IMAGE}
          ARG GPU_ARCH
          ARG AITER_REPO
          ARG AITER_COMMIT
          RUN pip install -U lm-eval[api]
          RUN pip show lm-eval || true
          RUN pip install hf_transfer
          RUN pip show hf_transfer || true
          RUN echo "=== Aiter version BEFORE uninstall ===" && pip show amd-aiter || true
          RUN pip uninstall -y amd-aiter
          RUN pip install --upgrade "pybind11>=3.0.1"
          RUN pip show pybind11
          RUN rm -rf /app/aiter-test
          RUN git clone --depth 1 "${AITER_REPO}" /app/aiter-test && \
              cd /app/aiter-test && \
              git checkout "${AITER_COMMIT}" && \
              git submodule sync && git submodule update --init --recursive && \
              MAX_JOBS=64 PREBUILD_KERNELS=0 GPU_ARCHS="${GPU_ARCH}" python3 setup.py develop
          RUN echo "=== Aiter version AFTER installation ===" && pip show amd-aiter || true
          RUN echo "=== ATOM version BEFORE uninstall ===" && pip show atom || true
          RUN pip uninstall -y atom
          RUN rm -rf /app/ATOM
          COPY . /app/ATOM
          RUN cd /app/ATOM && pip install -e .
          RUN echo "=== ATOM version AFTER installation ===" && pip show atom || true
          EOF

          echo "Building manual OOT image from branch ${GITHUB_REF_NAME}"

          docker build --pull --network=host --no-cache \
            -t "${MANUAL_BASE_IMAGE_TAG}" \
            --build-arg ATOM_BASE_NIGHTLY_IMAGE="${ATOM_BASE_NIGHTLY_IMAGE}" \
            --build-arg GPU_ARCH="${GPU_ARCH}" \
            --build-arg AITER_REPO="${AITER_REPO}" \
            --build-arg AITER_COMMIT="${AITER_COMMIT}" \
            -f "${BUILD_CONTEXT}/Dockerfile.mod" \
            "${BUILD_CONTEXT}"

          docker build --network=host --no-cache \
            -t "${OOT_IMAGE_TAG}" \
            --target atom_oot \
            --build-arg OOT_BASE_IMAGE="${MANUAL_BASE_IMAGE_TAG}" \
            --build-arg MAX_JOBS=64 \
            --build-arg VLLM_COMMIT="${VLLM_COMMIT}" \
            --build-arg INSTALL_LM_EVAL=1 \
            --build-arg INSTALL_FASTSAFETENSORS=1 \
            -f "${BUILD_CONTEXT}/docker/Dockerfile" \
            "${BUILD_CONTEXT}"

          docker push "${OOT_IMAGE_TAG}"

          echo "oot_image_tag=${OOT_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "cleanup_temp_image=true" >> "$GITHUB_OUTPUT"
          echo "manual_base_image_tag=${MANUAL_BASE_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Clean up builder images
        if: ${{ always() && steps.meta.outputs.cleanup_temp_image == 'true' }}
        run: |
          docker rmi "${{ steps.meta.outputs.oot_image_tag }}" || true
          docker rmi "${{ steps.meta.outputs.manual_base_image_tag }}" || true

  oot-model-accuracy:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    name: OOT Model Accuracy (${{ matrix.model_name }})
    needs: [prepare-oot-image]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-oot-image.outputs.model_matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    permissions:
      actions: read
      contents: write
    env:
      CONTAINER_NAME: atom_vllm_oot_validation_${{ strategy.job-index }}
      OOT_IMAGE_TAG: ${{ needs.prepare-oot-image.outputs.oot_image_tag }}
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Set HF_TOKEN
        run: echo "HF_TOKEN=${HF_TOKEN:-${{ secrets.AMD_HF_TOKEN }}}" >> "$GITHUB_ENV"

      - name: Pull OOT image
        run: |
          docker pull "${OOT_IMAGE_TAG}"

      - name: Prepare model cache mount
        run: |
          MODEL_CACHE_MOUNT=""
          MODEL_CACHE_DESC="container-local /models (no host cache mount)"

          if [ -d "/models" ]; then
            MODEL_CACHE_MOUNT="-v /models:/models"
            MODEL_CACHE_DESC="/models (host mount)"
          else
            echo "Warning: /models directory not found on runner; using container-local /models."
          fi

          echo "Using model cache backend: ${MODEL_CACHE_DESC}"
          echo "MODEL_CACHE_MOUNT=${MODEL_CACHE_MOUNT}" >> "$GITHUB_ENV"
          echo "MODEL_CACHE_DESC=${MODEL_CACHE_DESC}" >> "$GITHUB_ENV"

      - name: Clean up old containers
        run: |
          containers=$(docker ps -q)
          if [ -n "$containers" ]; then
            docker kill $containers || true
          fi
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true

      - name: Start validation container
        run: |
          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          MODEL_MOUNT="${MODEL_CACHE_MOUNT}"
          echo "Using model cache backend: ${MODEL_CACHE_DESC}"

          cat > /tmp/oot_env_file.txt << 'EOF'
          ${{ matrix.env_vars }}
          EOF

          docker run -dt --device=/dev/kfd $DEVICE_FLAG \
            -v "${GITHUB_WORKSPACE:-$PWD}":/workspace \
            $MODEL_MOUNT \
            -w /workspace \
            --ipc=host --group-add video \
            --shm-size=16G \
            --privileged \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            --env-file /tmp/oot_env_file.txt \
            -e HF_TOKEN="${HF_TOKEN:-}" \
            --name "$CONTAINER_NAME" \
            "${OOT_IMAGE_TAG}"
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Download model if needed
        run: |
          set -euo pipefail
          model_dir="/models/${{ matrix.model_path }}"
          if [ -n "${MODEL_CACHE_MOUNT}" ]; then
            lock_suffix="$(printf '%s' "${{ matrix.model_path }}" | tr '/:@' '___')"
            if ! docker exec \
              -e HF_TOKEN="${HF_TOKEN:-}" \
              -e MODEL_PATH="${{ matrix.model_path }}" \
              -e MODEL_DIR="$model_dir" \
              -e RUNNER_NAME="${{ matrix.runner }}" \
              -e LOCK_SUFFIX="$lock_suffix" \
              "$CONTAINER_NAME" \
              bash -lc '
                set -euo pipefail
                completion_flag="$MODEL_DIR/.download-complete"
                use_model_lock="true"

                if [ "$RUNNER_NAME" = "atom-mi355-8gpu.predownload" ]; then
                  use_model_lock="false"
                fi

                download_model() {
                  if [ -f "$MODEL_DIR/config.json" ]; then
                    echo "Model directory exists without a completion marker under ${MODEL_DIR}; validating download"
                  else
                    echo "Model not found under ${MODEL_DIR}; downloading model"
                  fi

                  rm -f "$completion_flag"
                  hf download "$MODEL_PATH" --local-dir "$MODEL_DIR"
                  touch "$completion_flag"
                }

                if [ -f "$completion_flag" ]; then
                  echo "Model already exists under ${MODEL_DIR}; skip download"
                elif [ "$use_model_lock" != "true" ]; then
                  echo "Baremetal runner ${RUNNER_NAME} detected; skipping shared model download lock"
                  download_model
                else
                  lock_dir="/models/.cache/atom-download-locks"
                  mkdir -p "$lock_dir"
                  lock_file="$lock_dir/${LOCK_SUFFIX}.lock"
                  exec 9>"$lock_file"
                  echo "Waiting for model download lock: $lock_file"
                  if ! flock -w 7200 9; then
                    echo "Timed out waiting for model download lock: $lock_file"
                    exit 1
                  fi

                  if [ -f "$completion_flag" ]; then
                    echo "Model became available under ${MODEL_DIR} while waiting for the lock; skip download"
                  else
                    download_model
                  fi
                fi
              '; then
              echo "Model download failed for '${{ matrix.model_path }}'. Aborting."
              exit 1
            fi
          else
            echo "/models directory not mounted; skipping model download"
          fi

      - name: Resolve OOT model path
        if: success()
        run: |
          if [ -n "${MODEL_CACHE_MOUNT}" ]; then
            echo "OOT_RESOLVED_MODEL_PATH=/models/${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using mounted model path: /models/${{ matrix.model_path }}"
          else
            echo "OOT_RESOLVED_MODEL_PATH=${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using model id: ${{ matrix.model_path }}"
          fi

      - name: Run OOT launch and gsm8k accuracy via script (full mode)
        timeout-minutes: 120
        env:
          OOT_MODEL_NAME: ${{ matrix.model_name }}
          OOT_MODEL_PATH: ${{ matrix.model_path }}
          OOT_EXTRA_ARGS: ${{ matrix.extra_args }}
          OOT_ENV_VARS: ${{ matrix.env_vars }}
          MAX_WAIT_RETRIES: "120"
          STREAM_VLLM_LOGS: "1"
        run: |
          docker exec \
            -e OOT_MODEL_NAME="${OOT_MODEL_NAME}" \
            -e OOT_MODEL_PATH="${OOT_RESOLVED_MODEL_PATH:-$OOT_MODEL_PATH}" \
            -e OOT_EXTRA_ARGS="${OOT_EXTRA_ARGS}" \
            -e OOT_ENV_VARS="${OOT_ENV_VARS}" \
            -e MAX_WAIT_RETRIES="${MAX_WAIT_RETRIES}" \
            -e STREAM_VLLM_LOGS="${STREAM_VLLM_LOGS}" \
            "$CONTAINER_NAME" bash -lc "
              set -euo pipefail
              bash .github/scripts/atom_oot_test.sh accuracy full
            "

      - name: Check OOT accuracy test results
        if: success()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/oot_accuracy_results ./oot_accuracy_results || true
          result_file=$(ls -1t oot_accuracy_results/*.json 2>/dev/null | head -n 1)
          if [ -z "$result_file" ] || [ ! -f "$result_file" ]; then
            echo "ERROR: No results JSON file found in oot_accuracy_results/"
            exit 2
          fi

          echo "RESULT_FILE: $result_file"
          flexible_extract_value=$(jq '.results.gsm8k["exact_match,flexible-extract"]' "$result_file")
          echo "Flexible extract value: $flexible_extract_value"
          echo "Accuracy test threshold: ${{ matrix.accuracy_test_threshold }}"

          result=$(awk -v val="$flexible_extract_value" -v threshold="${{ matrix.accuracy_test_threshold }}" 'BEGIN {print (val < threshold) ? 1 : 0}')
          if [ "$result" -eq 1 ]; then
            echo "Accuracy test failed: Flexible extract value $flexible_extract_value is less than threshold ${{ matrix.accuracy_test_threshold }}."
            exit 1
          else
            echo "Accuracy test passed: Flexible extract value $flexible_extract_value is greater than or equal to threshold ${{ matrix.accuracy_test_threshold }}."
            exit 0
          fi

      - name: Collect summary
        if: success()
        run: |
          echo "OOT gsm8k summary for ${{ matrix.model_name }}:" >> $GITHUB_STEP_SUMMARY
          docker exec "$CONTAINER_NAME" bash -lc "awk '/\|Tasks\|Version\|/,/^$/ { if (NF > 0) print }' /tmp/oot_accuracy_output.txt" >> $GITHUB_STEP_SUMMARY || true

      - name: Collect artifacts
        if: always()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/vllm_oot.log ./vllm_oot.log || true
          docker cp "$CONTAINER_NAME":/tmp/oot_accuracy_output.txt ./oot_accuracy_output.txt || true
          docker cp "$CONTAINER_NAME":/tmp/oot_accuracy_results ./oot_accuracy_results || true

      # Publish each finished model case immediately so successful nightly/full
      # results become visible on the dashboard even if other matrix cases are
      # still queued or later fail.
      - name: Prepare per-case accuracy dashboard payload
        if: always() && hashFiles('oot_accuracy_results/*.json') != ''
        run: |
          rm -rf accuracy-dashboard-input
          mkdir -p "accuracy-dashboard-input/accuracy-${{ matrix.model_name }}"
          cp oot_accuracy_results/*.json "accuracy-dashboard-input/accuracy-${{ matrix.model_name }}/"

          python3 .github/scripts/accuracy_to_dashboard.py \
            accuracy-dashboard-input \
            --output accuracy-benchmark-input.json \
            --models .github/benchmark/oot_models_accuracy.json \
            --backend "ATOM-vLLM" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          echo "=== Generated per-case dashboard entries ==="
          cat accuracy-benchmark-input.json

      - name: Publish per-case accuracy result to dashboard
        if: always() && hashFiles('accuracy-benchmark-input.json') != ''
        continue-on-error: true
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customBiggerIsBetter
          output-file-path: accuracy-benchmark-input.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmark-dashboard
          auto-push: true
          max-items-in-chart: 90
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload model artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oot-validation-${{ matrix.model_name }}-${{ github.run_id }}
          path: |
            vllm_oot.log
            oot_accuracy_output.txt
            oot_accuracy_results

      - name: Upload accuracy results for dashboard
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: accuracy-${{ matrix.model_name }}
          path: oot_accuracy_results/*.json
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          docker exec "$CONTAINER_NAME" bash -lc "if [ -f /tmp/vllm_oot.pid ]; then kill \$(cat /tmp/vllm_oot.pid) || true; fi" || true
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          docker rmi "${OOT_IMAGE_TAG}" || true

  # Rebuild the dashboard payload from all uploaded accuracy artifacts after
  # the full matrix completes. This final pass converges the dashboard state
  # and backfills any successful cases that did not publish earlier.
  accuracy-dashboard:
    name: Update OOT accuracy dashboard
    needs: [oot-model-accuracy]
    if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Prepare accuracy artifact directory
        run: mkdir -p /tmp/accuracy-results

      - name: Download accuracy artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/accuracy-results
          pattern: accuracy-*
        continue-on-error: true

      - name: Count downloaded accuracy artifacts
        id: downloaded
        run: |
          json_count=$(find /tmp/accuracy-results -type f -name '*.json' | wc -l | tr -d ' ')
          echo "json_count=${json_count}" >> "$GITHUB_OUTPUT"
          echo "Downloaded ${json_count} OOT accuracy JSON files"

      - name: List downloaded accuracy artifacts
        if: steps.downloaded.outputs.json_count != '0'
        run: |
          echo "=== Downloaded OOT accuracy artifacts ==="
          find /tmp/accuracy-results -type f -name '*.json' | head -20 || echo "No JSON files found"

      - name: Transform OOT accuracy results for dashboard
        if: steps.downloaded.outputs.json_count != '0'
        run: |
          python3 .github/scripts/accuracy_to_dashboard.py \
            /tmp/accuracy-results \
            --output accuracy-benchmark-input.json \
            --models .github/benchmark/oot_models_accuracy.json \
            --backend "ATOM-vLLM" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "=== Generated entries ==="
          cat accuracy-benchmark-input.json

      - name: Store OOT accuracy result to dashboard
        if: steps.downloaded.outputs.json_count != '0'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customBiggerIsBetter
          output-file-path: accuracy-benchmark-input.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmark-dashboard
          auto-push: true
          max-items-in-chart: 90
          github-token: ${{ secrets.GITHUB_TOKEN }}
