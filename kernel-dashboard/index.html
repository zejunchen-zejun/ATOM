<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATOM Kernel Dashboard — OOT vs vLLM Upstream</title>
<link rel="icon" href="https://rocm.github.io/ATOM/docs/assets/favicon.ico" type="image/x-icon">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0b0c10;--s1:#141519;--s2:#1c1d24;--bd:#303140;--bd2:#262733;--t1:#eef0f6;--t2:#bfc1d0;--t3:#7e8094;--brand:#d86ecc;--ui:#8899b8;--grn:#56d472;--red:#f25c4e;--org:#eda06a;--ylw:#ddb040;--pur:#c49af5;--blu:#5b9bf5;--r:8px;--g:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;background:var(--bg);color:var(--t2);overflow-x:hidden}
a{color:var(--ui);text-decoration:none}a:hover{text-decoration:underline}
code{font-family:"SF Mono","Fira Code",Consolas,monospace;font-size:12px;background:var(--s2);padding:2px 6px;border-radius:4px}

.topnav{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 24px;background:#0d0e12;border-bottom:1px solid var(--bd2);font-size:12px;flex-wrap:wrap}
.topnav-left{display:flex;align-items:center;gap:14px}
.topnav-left a{display:flex;align-items:center;gap:5px;color:var(--t3);transition:.15s}
.topnav-left a:hover{color:var(--t1);text-decoration:none}
.topnav-left svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.topnav-left .active-link{color:var(--ui);font-weight:600}
.topnav-right{display:flex;align-items:center;gap:12px}
.topnav-right a{color:var(--t3);padding:3px 8px;border:1px solid var(--bd);border-radius:4px;font-size:11px;transition:.15s}
.topnav-right a:hover{color:var(--t1);border-color:var(--ui);text-decoration:none;background:rgba(91,155,245,.06)}

header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--g);padding:12px 24px;border-bottom:2px solid var(--brand);position:sticky;top:0;z-index:50;background:var(--bg)}
.hdr-left{display:flex;align-items:center;gap:12px}
h1{font-size:18px;color:var(--t1);font-weight:600}
h1 .sep{color:var(--t3);font-weight:300;margin:0 4px}
h1 .sub{color:var(--t2);font-weight:400}
.meta{font-size:11px;color:var(--t3)}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);padding:0 24px;background:var(--s1)}
.tab{padding:10px 18px;font-size:13px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;user-select:none;white-space:nowrap}
.tab:hover{color:var(--t2);background:rgba(136,153,184,.04)}
.tab.active{color:var(--t1);border-bottom-color:var(--ui)}

.container{max-width:1440px;margin:0 auto;padding:20px 24px}
.panel{display:none}.panel.active{display:block}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center}
.kpi .lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.kpi .val{font-size:26px;font-weight:700;font-family:"SF Mono",monospace;margin:4px 0}
.kpi .sub{font-size:11px;color:var(--t3)}
.kpi.g{border-color:var(--grn)}.kpi.r{border-color:var(--red)}.kpi.y{border-color:var(--ylw)}

.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:16px;margin-bottom:20px}
.chart-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px}
.chart-card h3{font-size:13px;color:var(--t1);margin-bottom:10px;font-weight:500}
.chart-card canvas{width:100%!important;max-height:300px}

.sec{font-size:15px;font-weight:600;color:var(--t1);margin:24px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--ui)}

table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:12px}
thead th{background:var(--s1);color:var(--ui);padding:8px 10px;text-align:left;border-bottom:2px solid var(--bd);position:sticky;top:108px;z-index:2;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{background:var(--s2)}
thead th::after{content:" \2195";font-size:9px;color:var(--t3)}
thead th.asc::after{content:" \25B2";color:var(--ui)}
thead th.desc::after{content:" \25BC";color:var(--ui)}
tbody td{padding:8px 10px;border-bottom:1px solid var(--bd2);vertical-align:top}
tbody tr:hover{background:rgba(91,155,245,.03)}
.m{font-family:"SF Mono","Fira Code",monospace;font-size:11px}

.bg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
.bg-y{background:rgba(86,212,114,.12);color:var(--grn);border:1px solid rgba(86,212,114,.3)}
.bg-n{background:rgba(242,92,78,.12);color:var(--red);border:1px solid rgba(242,92,78,.3)}
.dg{color:var(--grn);font-weight:600}.dr{color:var(--red);font-weight:600}.dy{color:var(--ylw);font-weight:600}
.db{color:var(--red);font-weight:700;font-size:13px}

.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;margin:0 2px 2px 0;background:rgba(91,155,245,.1);color:var(--blu);border:1px solid rgba(91,155,245,.2)}
.note{color:var(--t3);font-size:11px;font-style:italic;margin:6px 0 14px}
.box{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px 18px;margin-bottom:16px}
.box h3{color:var(--ui);font-size:13px;margin-bottom:6px}
.box ul{padding-left:16px}.box li{font-size:12px;padding:2px 0}
.box.alert{border-left:3px solid var(--red)}
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-left">
    <a href="https://github.com/ROCm/ATOM" target="_blank"><svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>ATOM Repo</a>
    <a href="https://rocm.github.io/ATOM/benchmark-dashboard/" target="_blank"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>Benchmark Dashboard</a>
    <a class="active-link" href="#"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>Kernel Comparison</a>
  </div>
  <div class="topnav-right">
    <a href="https://github.com/vllm-project/vllm" target="_blank">vLLM Upstream</a>
    <a href="https://github.com/ROCm/aiter" target="_blank">AITER</a>
    <a href="https://github.com/ROCm/ATOM/tree/main/recipes" target="_blank">Recipes</a>
    <a href="https://rocm.github.io/ATOM/docs/" target="_blank">Docs</a>
  </div>
</nav>

<header>
  <div class="hdr-left">
    <h1>ATOM Kernel Dashboard<span class="sep">|</span><span class="sub">OOT vs Upstream vLLM</span></h1>
  </div>
  <div class="meta" id="hdr-meta"></div>
</header>

<div class="tabs" id="tabs"></div>

<div class="container" id="content"></div>

<script>
const TABS=[
  {id:'overview',label:'Overview'},
  {id:'deepseek',label:'DeepSeek-R1'},
  {id:'gptoss',label:'GPT-OSS-120B'},
  {id:'kimi',label:'Kimi-K2.5'},
  {id:'kernels',label:'All Kernels'}
];

let DATA;
const CE=t=>{const e=document.createElement(t);return e};
const Q=s=>document.querySelector(s);
const QA=s=>document.querySelectorAll(s);

fetch('data.json').then(r=>r.json()).then(d=>{DATA=d;init()});

function init(){
  Q('#hdr-meta').innerHTML=`${DATA.meta.hardware} · Updated ${DATA.meta.updated} · <a href="https://rocm.github.io/ATOM/benchmark-dashboard/" target="_blank" style="color:var(--ui)">Nightly Benchmarks ↗</a>`;
  const nav=Q('#tabs');
  TABS.forEach((t,i)=>{
    const b=CE('div');b.className='tab'+(i===0?' active':'');b.textContent=t.label;b.dataset.tab=t.id;
    b.onclick=()=>{QA('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');QA('.panel').forEach(x=>x.classList.remove('active'));Q('#p-'+t.id).classList.add('active')};
    nav.appendChild(b);
  });
  const c=Q('#content');
  TABS.forEach((t,i)=>{const p=CE('div');p.id='p-'+t.id;p.className='panel'+(i===0?' active':'');c.appendChild(p)});
  renderOverview();renderDeepSeek();renderGptOss();renderKimi();renderKernels();
  QA('table.st').forEach(makeSort);
}

/* ─── Chart defaults ─── */
Chart.defaults.color='#bfc1d0';
Chart.defaults.borderColor='#303140';
Chart.defaults.font.family='-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif';
Chart.defaults.font.size=11;
const ATOM_C='#56d472';const VLLM_C='#f25c4e';const MTP_C='#5b9bf5';

function barChart(canvas,labels,datasets,opts={}){
  return new Chart(canvas,{type:'bar',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:12,padding:8}}},scales:{x:{grid:{display:false}},y:{beginAtZero:true,title:{display:!!opts.yLabel,text:opts.yLabel||''}}}}});
}
function lineChart(canvas,labels,datasets,opts={}){
  return new Chart(canvas,{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'top',labels:{boxWidth:12,padding:8}}},scales:{x:{title:{display:!!opts.xLabel,text:opts.xLabel||''}},y:{beginAtZero:true,title:{display:!!opts.yLabel,text:opts.yLabel||''}}}}});
}

/* ─── OVERVIEW ─── */
function renderOverview(){
  const p=Q('#p-overview');
  const m=DATA.meta;
  p.innerHTML=`
<div class="box" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
  <div>
    <h3 style="margin-bottom:6px">ATOM OOT (Out-of-Tree)</h3>
    <div style="font-size:12px;line-height:1.8">
      <div>Docker: <code>${m.atom_image}</code></div>
      <div>ATOM: <code>${m.atom_version}</code> · AITER: <code>${m.aiter_oot}</code> · FlyDSL: <code>${m.flydsl}</code></div>
      <div><a href="https://github.com/ROCm/ATOM" target="_blank">github.com/ROCm/ATOM ↗</a> · <a href="https://github.com/ROCm/aiter" target="_blank">AITER ↗</a></div>
    </div>
  </div>
  <div>
    <h3 style="margin-bottom:6px">Upstream vLLM</h3>
    <div style="font-size:12px;line-height:1.8">
      <div>Docker: <code>${m.vllm_image}</code></div>
      <div>vLLM: <code>${m.vllm_version}</code> · AITER: <code>${m.aiter_upstream}</code></div>
      <div><a href="https://github.com/vllm-project/vllm" target="_blank">github.com/vllm-project/vllm ↗</a> · <a href="https://github.com/vllm-project/vllm/tree/main/vllm/v1/attention/backends" target="_blank">MLA backends ↗</a></div>
    </div>
  </div>
</div>
<div class="kpi-row">
  <div class="kpi r"><div class="lbl">DeepSeek-R1 Output Tput</div><div class="val dg">+186.8%</div><div class="sub">1,019 vs 356 tok/s (c16)</div></div>
  <div class="kpi r"><div class="lbl">DeepSeek-R1 TPOT</div><div class="val dg">−62.2%</div><div class="sub">15.27 vs 40.44 ms</div></div>
  <div class="kpi r"><div class="lbl">DeepSeek-R1 TTFT</div><div class="val dg">−89.9%</div><div class="sub">102.6 vs 1,013 ms</div></div>
  <div class="kpi y"><div class="lbl">GPT-OSS Output Tput</div><div class="val dy">+4.0%</div><div class="sub">2,219 vs 2,133 tok/s (c16)</div></div>
  <div class="kpi r"><div class="lbl">Kimi-K2.5 TPOT</div><div class="val dg">−71.0%</div><div class="sub">15.46 vs 53.38 ms</div></div>
</div>
<div class="chart-grid">
  <div class="chart-card"><h3>Output Throughput @ Concurrency 16 (tok/s) — Higher is Better</h3><div style="height:280px"><canvas id="ch-ov-tput"></canvas></div></div>
  <div class="chart-card"><h3>TPOT @ Concurrency 16 (ms) — Lower is Better</h3><div style="height:280px"><canvas id="ch-ov-tpot"></canvas></div></div>
  <div class="chart-card"><h3>TTFT @ Concurrency 16 (ms) — Lower is Better</h3><div style="height:280px"><canvas id="ch-ov-ttft"></canvas></div></div>
  <div class="chart-card"><h3>Kernel Merge Status</h3><div style="height:280px"><canvas id="ch-ov-merge"></canvas></div></div>
</div>
<div class="sec">Head-to-Head Summary — ISL 1024, OSL 1024, c16</div>
<table class="st"><thead><tr><th>Model</th><th>Metric</th><th>ATOM OOT</th><th>vLLM v0.18</th><th>% Change</th><th>Primary Cause</th></tr></thead><tbody>
<tr><td><b>DeepSeek-R1</b><br><span class="m" style="color:var(--t3)">FP8, TP8</span></td><td>Output tput</td><td class="m">1,019</td><td class="m">356</td><td class="db">+186.8%</td><td>ASM persistent MLA decode</td></tr>
<tr><td></td><td>TPOT (ms)</td><td class="m">15.27</td><td class="m">40.44</td><td class="dg">−62.2%</td><td>ASM persistent MLA decode</td></tr>
<tr><td></td><td>TTFT (ms)</td><td class="m">102.60</td><td class="m">1,013</td><td class="dg">−89.9%</td><td>ASM MLA prefill + fused ops</td></tr>
<tr><td><b>DS-R1 + MTP3</b></td><td>Output tput</td><td class="m">1,603</td><td class="m">356</td><td class="db">+350.6%</td><td>MLA + MTP speculative decode</td></tr>
<tr><td><b>GPT-OSS-120B</b><br><span class="m" style="color:var(--t3)">FP8, TP1</span></td><td>Output tput</td><td class="m">2,219</td><td class="m">2,133</td><td class="dy">+4.0%</td><td>GQA → no MLA advantage</td></tr>
<tr><td></td><td>TPOT (ms)</td><td class="m">6.78</td><td class="m">6.54</td><td class="dy">~same</td><td>Same AITER FA backend</td></tr>
<tr><td><b>Kimi-K2.5</b><br><span class="m" style="color:var(--t3)">MXFP4, TP8 vs TP4*</span></td><td>Output tput</td><td class="m">1,000 <span style="color:var(--t3)">(TP4,1k)</span></td><td class="m">276 <span style="color:var(--t3)">(TP8,8k)</span></td><td class="db">~3.6x*</td><td>ASM persistent MLA decode</td></tr>
<tr><td></td><td>TPOT (ms)</td><td class="m">15.46 <span style="color:var(--t3)">(TP4)</span></td><td class="m">53.38 <span style="color:var(--t3)">(TP8)</span></td><td class="dg">−71.0%*</td><td>MLA bottleneck, not MoE</td></tr>
</tbody></table>
<p class="note">* Kimi: ATOM=TP4/ISL 1k, upstream=TP8/ISL 8k. Despite 2x more GPUs, upstream is 3.6x slower.</p>
<div class="box alert"><h3>Key Insight</h3><ul>
<li><b>MLA models (DeepSeek, Kimi): 2.9–4.5x gap</b> — ASM persistent MLA + fused ops + MI355 FP8 tuning</li>
<li><b>GQA models (GPT-OSS): ~4% gap</b> — upstream AITER FA already well-optimized</li>
<li><b>Kimi proves MoE ≠ bottleneck:</b> Both use CK+FlyDSL MoE, yet ATOM 3–4x faster → MLA is #1 priority</li>
<li><b>Missing MI355 FP8 GEMM configs</b> in upstream: "Performance might be sub-optimal!"</li>
</ul></div>`;

  const mdls=['DeepSeek-R1','DeepSeek-R1\n+MTP3','GPT-OSS\n120B','Kimi-K2.5'];
  barChart(Q('#ch-ov-tput'),mdls,[
    {label:'ATOM OOT',data:[1019,1603,2219,1000],backgroundColor:ATOM_C+'cc'},
    {label:'vLLM v0.18',data:[356,356,2133,276],backgroundColor:VLLM_C+'cc'}
  ],{yLabel:'tok/s'});
  barChart(Q('#ch-ov-tpot'),mdls,[
    {label:'ATOM OOT',data:[15.27,9.49,6.78,15.46],backgroundColor:ATOM_C+'cc'},
    {label:'vLLM v0.18',data:[40.44,40.44,6.54,53.38],backgroundColor:VLLM_C+'cc'}
  ],{yLabel:'ms'});
  barChart(Q('#ch-ov-ttft'),['DeepSeek-R1','GPT-OSS','Kimi-K2.5'],[
    {label:'ATOM OOT',data:[102.6,78.79,173.87],backgroundColor:ATOM_C+'cc'},
    {label:'vLLM v0.18',data:[1013,494.22,1351.74],backgroundColor:VLLM_C+'cc'}
  ],{yLabel:'ms'});

  const merged=DATA.kernels.filter(k=>k.merged).length;
  const notm=DATA.kernels.filter(k=>!k.merged).length;
  new Chart(Q('#ch-ov-merge'),{type:'doughnut',data:{labels:['Merged ('+merged+')','Not Merged ('+notm+')'],datasets:[{data:[merged,notm],backgroundColor:[ATOM_C+'99',VLLM_C+'99'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});
}

/* ─── DEEPSEEK ─── */
function renderDeepSeek(){
  const p=Q('#p-deepseek');
  const d=DATA.models.deepseek_r1;const dm=DATA.models.deepseek_r1_mtp3;
  p.innerHTML=`
<div class="kpi-row">
  <div class="kpi r"><div class="lbl">Output Throughput c16</div><div class="val dg">+186.8%</div><div class="sub">1,019 vs 356 tok/s</div></div>
  <div class="kpi r"><div class="lbl">TPOT c16</div><div class="val dg">−62.2%</div><div class="sub">15.27 vs 40.44 ms</div></div>
  <div class="kpi r"><div class="lbl">TTFT c16</div><div class="val dg">−89.9%</div><div class="sub">102.6 vs 1,013 ms</div></div>
  <div class="kpi g"><div class="lbl">With MTP3 c16</div><div class="val dg">+350.6%</div><div class="sub">1,603 vs 356 tok/s</div></div>
</div>
<div class="chart-grid">
  <div class="chart-card"><h3>Output Throughput vs Concurrency (tok/s)</h3><div style="height:300px"><canvas id="ch-ds-tput"></canvas></div></div>
  <div class="chart-card"><h3>TPOT vs Concurrency (ms)</h3><div style="height:300px"><canvas id="ch-ds-tpot"></canvas></div></div>
</div>
<div class="sec">Kernel-by-Kernel Breakdown</div>
<table class="st"><thead><tr><th>Component</th><th>OOT Kernel</th><th>Upstream Kernel</th><th>Merged?</th><th>E2E Impact</th></tr></thead><tbody id="ds-kern"></tbody></table>
<div class="sec">Throughput by Concurrency — ISL 1024 / OSL 1024</div>
<table class="st"><thead><tr><th>Conc</th><th>ATOM Output</th><th>vLLM Output</th><th>% Change</th><th>ATOM TPOT</th><th>vLLM TPOT</th><th>ATOM TTFT p50</th><th>vLLM TTFT</th></tr></thead><tbody id="ds-bench"></tbody></table>
<div class="sec">MTP3 Speculative Decoding — ISL 1024 / OSL 1024</div>
<table class="st"><thead><tr><th>Conc</th><th>ATOM Output</th><th>vs vLLM c16</th><th>ATOM TPOT p50</th><th>Accept Rate</th></tr></thead><tbody id="ds-mtp"></tbody></table>`;

  const concs=d.atom_bench.map(r=>r.conc);
  const atomT=d.atom_bench.map(r=>r.output_tps);
  const mtpT=dm.atom_bench.map(r=>r.output_tps);
  const mtpConcs=dm.atom_bench.map(r=>r.conc);
  lineChart(Q('#ch-ds-tput'),concs,[
    {label:'ATOM FP8',data:atomT,borderColor:ATOM_C,backgroundColor:ATOM_C+'33',fill:true,tension:.3},
    {label:'ATOM FP8+MTP3',data:mtpConcs.map((c,i)=>{const idx=concs.indexOf(c);return idx>=0?mtpT[i]:null}),borderColor:MTP_C,backgroundColor:MTP_C+'33',fill:true,tension:.3},
    {label:'vLLM v0.18',data:concs.map(c=>c===16?355.51:null),borderColor:VLLM_C,backgroundColor:VLLM_C+'66',pointRadius:8,pointStyle:'crossRot',showLine:false}
  ],{xLabel:'Concurrency',yLabel:'tok/s'});

  const atomP=d.atom_bench.map(r=>r.tpot_p50);
  lineChart(Q('#ch-ds-tpot'),concs,[
    {label:'ATOM FP8',data:atomP,borderColor:ATOM_C,tension:.3},
    {label:'vLLM v0.18',data:concs.map(c=>c===16?40.44:null),borderColor:VLLM_C,pointRadius:8,pointStyle:'crossRot',showLine:false}
  ],{xLabel:'Concurrency',yLabel:'ms'});

/* ─── SORTABLE TABLES ─── */
function makeSort(tbl){
  tbl.querySelectorAll('thead th').forEach((th,ci)=>{
    th.addEventListener('click',()=>{
      const tb=tbl.querySelector('tbody');const rows=[...tb.querySelectorAll('tr')];
      const asc=th.classList.contains('asc');
      tbl.querySelectorAll('th').forEach(h=>{h.classList.remove('asc','desc')});
      th.classList.add(asc?'desc':'asc');
      const d=asc?-1:1;
      rows.sort((a,b)=>{
        const ac=a.children[ci],bc=b.children[ci];
        if(!ac||!bc)return 0;
        let at=ac.textContent.trim().replace(/[,%\s]/g,''),bt=bc.textContent.trim().replace(/[,%\s]/g,'');
        const an=parseFloat(at.replace(/[^0-9.\-]/g,'')),bn=parseFloat(bt.replace(/[^0-9.\-]/g,''));
        if(!isNaN(an)&&!isNaN(bn))return(an-bn)*d;
        return at.localeCompare(bt)*d;
      });
      rows.forEach(r=>tb.appendChild(r));
    });
  });
}
